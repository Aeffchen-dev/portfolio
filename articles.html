<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#060606">
  <title>Articles — Jana Gramlich</title>
  <meta name="description" content="Writing and editorial work by Jana Gramlich, product designer based in Berlin.">
  <link rel="canonical" href="https://portfolio.janagramlich.com/articles.html">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Jana Gramlich • Articles">
  <meta property="og:description" content="Writing and editorial work by Jana Gramlich, product designer based in Berlin.">
  <meta property="og:url" content="https://portfolio.janagramlich.com/articles.html">
  <link rel="icon" type="image/svg+xml" href="images/logo.svg">
  <link rel="alternate icon" href="images/logo.svg">
  <link rel="apple-touch-icon" href="images/logo.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;1,9..40,400&display=swap" rel="stylesheet">
  <style>
    @view-transition { navigation: auto; }
    @font-face {
      font-family: 'HW Left Bold';
      src: url('images/HW Left Bold.woff') format('woff');
      font-weight: bold;
      font-style: normal;
      font-display: swap;
    }
    /* === RESET === */
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    html { -webkit-font-smoothing:antialiased; scroll-behavior:smooth; }
    body {
      font-family:'DM Sans', sans-serif;
      font-optical-sizing:auto;
      background:#060606;
      color:#fff;
      overflow-x:hidden;
    }
    img { display:block; }
    button { cursor:pointer; border:none; background:none; font-family:inherit; }
    a { text-decoration:none; color:inherit; }

    /* === NAV === */
    .nav {
      position:fixed; top:8px;
      left:50%; transform:translateX(-50%);
      width:calc(100vw - 16px);
      border-radius:0;
      background:transparent;
      backdrop-filter:none;
      -webkit-backdrop-filter:none;
      overflow:hidden;
      z-index:100;
    }
    .nav.is-open { width:min(calc(100vw - 16px), 400px); border-radius:24px; backdrop-filter:blur(20px) saturate(180%); -webkit-backdrop-filter:blur(20px) saturate(180%); }
    @media (min-width:640px) and (max-width:1023px) { .nav.is-open { width:calc(100vw - 16px); } }
    .nav::before {
      content:'';
      position:absolute;
      width:164%; height:227%;
      left:-28%; top:-8%;
      background:url('images/nav-bg.png') center/cover no-repeat;
      opacity:var(--nav-bg-opacity, 0);
      z-index:-1;
    }
    .nav.is-open::before { transition:opacity .4s cubic-bezier(.4,0,.2,1); opacity:0.65; }
    .nav__bar {
      height:33px; display:flex; align-items:center;
      padding:0 16px; cursor:pointer;
      width:100%;
    }
    .nav.is-open .nav__bar {
      padding-left:calc((100% - var(--pill-w, 168px)) / 2 + 16px);
      padding-right:calc((100% - var(--pill-w, 168px)) / 2 + 16px);
    }
    .nav__logo {
      font-family:'HW Left Bold', sans-serif;
      font-size:12px; font-weight:bold; line-height:1; color:#fff;
      letter-spacing:0.56px; text-transform:uppercase; white-space:nowrap;
    }
    .nav__menu {
      display:flex; flex-direction:row; align-items:center; gap:3px;
      width:15px; height:13px; flex-shrink:0; position:relative;
      margin-left:auto; overflow:visible;
    }
    .nav__menu > span:not(.nav__close-icon) {
      display:block; width:3px; height:3px; border-radius:50%;
      background:#fff; flex-shrink:0;
      transition:opacity .25s ease;
    }
    .nav__close-icon {
      position:absolute; inset:0;
      display:flex; align-items:center; justify-content:center;
      opacity:0; transition:opacity .25s ease, transform .25s cubic-bezier(.4,0,.2,1); color:#fff;
      transform:rotate(-45deg) scale(0.7);
    }
    .nav.is-open .nav__menu > span:not(.nav__close-icon) { opacity:0; }
    .nav.is-open .nav__close-icon { opacity:1; transform:rotate(0deg) scale(1); }
    .nav__menu { transition:transform .2s cubic-bezier(.4,0,.2,1); }
    .nav__menu:hover { transform:scale(1.15); }
    .nav__menu:active { transform:scale(0.9); }
    .nav__expand {
      display:grid; grid-template-rows:0fr;
      transition:grid-template-rows .4s cubic-bezier(.4,0,.2,1);
    }
    .nav.is-open .nav__expand { padding-top:33px; grid-template-rows:1fr; }
    .nav__expand-inner { overflow:hidden; padding:0 16px; }
    .nav__links { padding:16px 0 16px; display:flex; flex-direction:column; width:50%; flex-shrink:0; }
    .nav__top-row { display:flex; align-items:flex-start; }
    @keyframes figmaCursor {
      0%   { transform:translate(4px, 2px); }
      15%  { transform:translate(22px, 18px); }
      30%  { transform:translate(38px, 8px); }
      45%  { transform:translate(28px, 34px); }
      60%  { transform:translate(8px, 44px); }
      75%  { transform:translate(44px, 30px); }
      90%  { transform:translate(16px, 12px); }
      100% { transform:translate(4px, 2px); }
    }
    .nav__vibe {
      padding:16px 0 16px; width:50%; flex-shrink:0; font-size:14px; font-weight:500;
      color:rgba(255,255,255,0.35); letter-spacing:0; line-height:1.5;
      text-align:left; position:relative;
      opacity:0; transform:translateY(8px);
      transition:opacity .2s ease, transform .25s ease;
    }
    .nav.is-open .nav__vibe {
      opacity:1; transform:translateY(0);
      transition:opacity .2s ease .22s, transform .25s ease .22s;
    }
    .nav__cursor {
      position:absolute; top:16px; left:0;
      pointer-events:none;
      animation:figmaCursor 5s ease-in-out infinite paused;
    }
    .nav.is-open .nav__cursor { animation-play-state:running; }
    .nav__cursor-tag {
      display:block;
      background:#acb0ff; color:#171717;
      font-size:10px; font-weight:700; letter-spacing:0;
      padding:2px 6px; border-radius:0 4px 4px 4px;
      white-space:nowrap; line-height:1.5;
      margin-top:-1px; margin-left:9px;
    }
    .nav__link {
      display:block;
      font-size:32px; font-weight:400; color:#fff; line-height:1.4;
      opacity:0; transform:translateY(8px);
      transition:opacity .2s ease, transform .25s ease, color .15s;
    }
    .nav.is-open .nav__link {
      opacity:1; transform:translateY(0);
      transition:opacity .2s ease .22s, transform .25s ease .22s, color .15s;
    }
    .nav__link:hover { color:rgba(255,255,255,.5); }
    .nav__link.is-current { color:rgba(255,255,255,.35); pointer-events:none; }
    .nav__divider {
      height:1px; background:rgba(255,255,255,0.12);
      margin:16px 0;
      opacity:0; transition:opacity .2s ease;
    }
    .nav.is-open .nav__divider { opacity:1; transition:opacity .2s ease .32s; }
    .nav__contact {
      padding:40px 16px 24px;
      opacity:0; transform:translateY(6px);
      transition:opacity .2s ease, transform .25s ease;
    }
    .nav.is-open .nav__contact {
      opacity:1; transform:translateY(0);
      transition:opacity .2s ease .34s, transform .25s ease .34s;
    }
    .nav__contact-label { font-size:12px; font-weight:500; color:#fff; letter-spacing:0.48px; text-transform:uppercase; }
    .nav__contact-email { display:block; font-size:16px; font-weight:500; color:#989898; margin-top:4px; }
    .nav__linkedin {
      display:inline-flex; align-items:center; justify-content:center;
      background:#acb0ff; color:#171717;
      border-radius:999px; padding:8px 10px;
      font-size:12px; font-weight:500; letter-spacing:0.48px; text-transform:uppercase;
      margin-top:40px;
    }

    /* === PAGE CONTENT === */
    .page-wrapper { background:#060606; min-height:100dvh; }
    .articles-page {
      padding:max(80px, 10dvh) 16px 80px;
      max-width:640px; margin:0 auto;
    }

    /* === SECTION LABEL === */
    .section-label {
      display:flex; align-items:baseline; gap:16px;
      margin-bottom:8px;
    }
    .section-label__prefix {
      font-size:11px; font-weight:500; color:#fff;
      letter-spacing:0.48px; text-transform:uppercase;
    }
    .section-label__count {
      font-size:11px; font-weight:500; color:#989898;
      letter-spacing:0.48px; text-transform:uppercase;
    }

    /* === CV CARD (articles — matches home CV row layout) === */
    .cv-card {
      display:flex; flex-direction:row; align-items:center; gap:0;
      padding:12px; background:#141414;
      border-radius:8px; margin-bottom:8px;
      text-decoration:none; color:inherit;
      transition:background .4s ease-in-out;
    }
    .cv-card:hover { background:rgba(255,255,255,0.1); }
    /* thumbnail: same 60×60 dimensions as CV company logo */
    .cv-card__thumb {
      width:60px; height:60px; flex-shrink:0;
      border-radius:6px; overflow:hidden; background:#1a1a1a;
    }
    .cv-card__thumb img { width:100%; height:100%; object-fit:cover; display:block; }
    .cv-card__thumb-placeholder {
      width:60px; height:60px;
      background:linear-gradient(135deg,#1e1e1e 0%,#2a2a2a 100%);
      border-radius:6px; flex-shrink:0;
    }
    .cv-card__body { flex:1; min-width:0; display:flex; flex-direction:row; align-items:center; gap:12px; padding-left:12px; }
    .cv-card__meta { flex:1; min-width:0; display:flex; flex-direction:column; gap:2px; }
    .cv-card__title { font-size:14px; font-weight:500; color:#fff; line-height:1.3; }
    .cv-card__category { font-size:14px; font-weight:400; color:#989898; }
    .cv-card__arrow { color:rgba(255,255,255,0.5); flex-shrink:0; display:flex; }

    /* === SKELETON === */
    .cv-card--skeleton { pointer-events:none; }
    .skeleton-block {
      background: linear-gradient(90deg, #1a1a1a 25%, #222 50%, #1a1a1a 75%);
      background-size:200% 100%;
      animation:shimmer 1.4s infinite;
      border-radius:2px;
    }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
    .sk-thumb { width:60px; height:60px; flex-shrink:0; border-radius:6px; }
    .sk-body { flex:1; display:flex; flex-direction:column; gap:6px; padding-left:12px; }
    .sk-line { height:12px; border-radius:2px; }
    .sk-line--title { width:65%; }
    .sk-line--cat   { width:35%; }

    /* === EMPTY STATE === */
    .articles-empty {
      padding:40px 8px; color:#989898;
      font-size:14px; text-align:center;
    }

    /* === FOOTER === */
    .articles-footer {
      display:flex; justify-content:space-between; align-items:center;
      padding-top:40px; margin-top:24px;
      border-top:1px solid rgba(255,255,255,0.08);
      font-size:12px; font-weight:500; letter-spacing:0.48px; text-transform:uppercase;
      position:relative;
    }
    .articles-footer .nav__cursor { animation-play-state:running; top:40px; }
    .articles-footer a { color:#fff; transition:opacity .4s ease-in-out; }
    .articles-footer a:hover { opacity:.5; }

    /* cv-card as clickable div */
    .cv-card { cursor:pointer; }

    /* === ARTICLE SHEET === */
    .art-backdrop {
      position:fixed; inset:0; z-index:199;
      background:transparent; pointer-events:none;
      transition:background .5s cubic-bezier(.4,0,.2,1);
    }
    .art-backdrop.is-active { background:rgba(0,0,0,0.6); pointer-events:auto; }

    .art-sheet {
      position:fixed; bottom:0; left:0;
      width:100vw; max-height:100dvh;
      border-radius:16px 16px 0 0; overflow:hidden;
      z-index:200;
      transform:translateY(100%);
      transition:transform .5s cubic-bezier(.4,0,.2,1);
      pointer-events:none;
    }
    .art-sheet.is-open { transform:translateY(0); pointer-events:auto; }

    .art-sheet__scroll {
      max-height:100dvh; overflow-y:auto; overflow-x:hidden;
      overscroll-behavior:contain; background:#0D0D0D; color:#fff;
      scrollbar-width:none;
    }
    .art-sheet__scroll::-webkit-scrollbar { display:none; }

    /* Hero — 100dvh split into two 50dvh halves */
    .art-sheet__hero {
      height:100dvh; display:flex; flex-direction:column; overflow:hidden;
    }

    /* Top 50dvh — BACK + date + title */
    .art-hero__top {
      height:50dvh; flex-shrink:0;
      display:flex; flex-direction:column;
      padding:16px 16px 24px;
      background:#0D0D0D;
    }
    .art-back-btn {
      font-size:11px; font-weight:500; color:#989898;
      letter-spacing:0.48px; text-transform:uppercase;
      display:inline-flex; align-items:center; gap:5px;
      background:none; border:none; cursor:pointer;
      font-family:inherit; padding:0; flex-shrink:0;
      transition:color .3s ease-in-out;
    }
    .art-back-btn:hover { color:#fff; }
    .art-hero__meta { margin-top:auto; }
    .art-hero__date {
      font-size:11px; font-weight:500; color:#989898;
      letter-spacing:0.48px; text-transform:none;
      margin-top:8px;
    }
    .art-hero__title {
      font-size:clamp(22px,5vw,48px); font-weight:500;
      color:#fff; line-height:1.05; letter-spacing:-0.02em;
      text-transform:uppercase;
    }

    /* Bottom 50dvh — image ×2 at 60vw, centered */
    .art-hero__img-wrap {
      height:50dvh; flex-shrink:0;
      display:flex; justify-content:center; align-items:flex-end;
      background:#0D0D0D; overflow:hidden;
    }
    .art-hero__img {
      width:60vw; height:50dvh;
      object-fit:cover; object-position:center bottom;
      display:block; flex-shrink:0;
    }
    .art-hero__img--portrait { display:block; }
    .art-hero__img--landscape { display:none; }
    @media (orientation:landscape) {
      .art-hero__img--portrait { display:none; }
      .art-hero__img--landscape { display:block; }
    }

    /* Content below hero */
    .art-sheet__content { padding:40px 16px 64px; max-width:640px; margin:0 auto; }
    .art-content-loading { padding:40px 16px; color:rgba(255,255,255,.4); font-size:14px; text-align:center; }
    .art-block { margin-bottom:48px; }
    .art-block img { width:100%; height:auto; display:block; border-radius:2px; }
    .art-block-text { font-size:15px; font-weight:400; line-height:1.65; color:rgba(255,255,255,.55); }
    .art-block-text p { margin-bottom:16px; }
    .art-block-text p:last-child { margin-bottom:0; }
    .art-block-text h2 { font-size:clamp(18px,2.5vw,26px); font-weight:500; color:#fff; letter-spacing:-0.02em; margin:28px 0 10px; }
    .art-block-text h3 { font-size:clamp(15px,1.8vw,20px); font-weight:500; color:#fff; margin:20px 0 8px; }
    .art-block-text a { color:rgba(255,255,255,.55); border-bottom:1px solid rgba(255,255,255,.2); }

    /* === VIEW TRANSITIONS === */
    @media (prefers-reduced-motion: no-preference) {
      ::view-transition-old(root), ::view-transition-new(root) { animation-duration: 0.2s; }
      ::view-transition-group(art-hero) {
        animation-duration: 0.5s;
        animation-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
      }
      ::view-transition-old(art-hero), ::view-transition-new(art-hero) {
        width: 100%; height: 100%;
        object-fit: cover; mix-blend-mode: normal;
      }
    }
  </style>
</head>

<script>
  // === NAV ===
  const nav = document.getElementById('mainNav');
  nav.addEventListener('mouseenter', () => nav.classList.add('is-open'));
  let _mlSuppress = false;
  nav.addEventListener('mouseleave', () => { if (!_mlSuppress) nav.classList.remove('is-open'); });
  nav.addEventListener('touchend', () => { _mlSuppress = true; setTimeout(() => { _mlSuppress = false; }, 600); }, { passive:true });
  nav.querySelector('.nav__logo').addEventListener('touchend', e => {
    if (!nav.classList.contains('is-open')) { e.preventDefault(); nav.classList.add('is-open'); }
  });
  nav.querySelector('.nav__logo').addEventListener('click', e => {
    if (!nav.classList.contains('is-open')) { e.preventDefault(); nav.classList.add('is-open'); }
  });
  nav.querySelector('.nav__menu').addEventListener('click', e => {
    e.stopPropagation();
    nav.classList.toggle('is-open');
  });
  nav.addEventListener('click', e => {
    if (e.pointerType !== 'touch') return;
    const onBar = e.target.closest('.nav__bar');
    const isOpen = nav.classList.contains('is-open');
    if (onBar && !isOpen) { e.preventDefault(); nav.classList.add('is-open'); }
    else if (onBar && !e.target.closest('a')) nav.classList.remove('is-open');
  });
  document.addEventListener('click', e => {
    if (e.pointerType === 'touch' && !e.target.closest('#mainNav')) nav.classList.remove('is-open');
  });

  (function() {
    const navBar  = nav.querySelector('.nav__bar');
    const navMenu = nav.querySelector('.nav__menu');
    const dots    = [...nav.querySelectorAll('.nav__menu span:not(.nav__close-icon)')];
    const logoEl  = navBar.querySelector('.nav__logo');

    function setPillState() {
      const targetW = logoEl.offsetWidth + 48;
      nav.style.width           = targetW + 'px';
      nav.style.top             = window.innerWidth >= 640 ? '8px' : '4px';
      nav.style.borderRadius    = '24px';
      nav.style.background      = 'rgba(255,255,255,0.05)';
      nav.style.setProperty('--nav-bg-opacity','0.65');
      nav.style.backdropFilter       = 'blur(20px) saturate(180%)';
      nav.style.webkitBackdropFilter = 'blur(20px) saturate(180%)';
      nav.style.setProperty('--pill-w', targetW + 'px');
      navBar.style.paddingLeft  = '16px';
      navBar.style.paddingRight = '16px';
      navBar.style.paddingTop   = '0';
      navBar.style.paddingBottom= '0';
      dots[0].style.opacity     = '0';
      dots[2].style.opacity     = '0';
      dots[0].style.transform   = 'translateX(6px)';
      dots[2].style.transform   = 'translateX(-6px)';
      dots[1].style.background  = 'rgb(172,176,255)';
      dots[1].style.width       = '8px';
      dots[1].style.height      = '8px';
      navMenu.style.width       = '8px';
    }

    const EASE      = 'cubic-bezier(.4,0,.2,1)';
    const NAV_TRANS = `width .4s ${EASE}, top .4s ${EASE}, border-radius .4s ${EASE}, background .4s ${EASE}, backdrop-filter .4s ${EASE}, -webkit-backdrop-filter .4s ${EASE}`;

    new MutationObserver(() => {
      nav.style.transition = NAV_TRANS;
      void nav.offsetHeight;
      if (nav.classList.contains('is-open')) {
        nav.style.width = ''; nav.style.top = ''; nav.style.borderRadius = '';
        nav.style.background = ''; nav.style.backdropFilter = ''; nav.style.webkitBackdropFilter = '';
        navBar.style.paddingLeft = ''; navBar.style.paddingRight = '';
        navBar.style.paddingTop  = ''; navBar.style.paddingBottom = '';
        dots.forEach(d => { d.style.opacity=''; d.style.transform=''; d.style.background=''; d.style.width=''; d.style.height=''; });
        navMenu.style.width = '8px';
      } else {
        setPillState();
      }
      setTimeout(() => { nav.style.transition = ''; }, 450);
    }).observe(nav, { attributes:true, attributeFilter:['class'] });

    window.addEventListener('resize', setPillState);
    setPillState();
  })();

  // === ARTICLES ===
  const API = 'https://cms.janagramlich.com/wp-json/wp/v2';
  const ARROW_SVG = `<svg class="arrow-icon" width="12" height="12" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.2" xmlns="http://www.w3.org/2000/svg"><path d="M2.3042 7.69434L7.38914 2.6094" stroke-linecap="square"/><path d="M2.3042 2.14746H7.8514V7.69467" stroke-linecap="square"/></svg>`;

  function formatDate(iso) {
    const d = new Date(iso);
    return d.toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' });
  }

  async function resolveImgUrl(img) {
    if (!img) return '';
    if (typeof img === 'object') return img.url || img.source_url || '';
    const id = parseInt(img, 10);
    if (!id) return typeof img === 'string' ? img : '';
    try {
      const r = await fetch(`${API}/media/${id}?_fields=source_url`, { signal: AbortSignal.timeout(5000) });
      if (r.ok) return (await r.json()).source_url || '';
    } catch(e) {}
    return '';
  }

  async function buildCard(post) {
    const title    = post.title?.rendered ? new DOMParser().parseFromString(post.title.rendered,'text/html').body.textContent : 'Untitled';
    const slug     = post.slug || '';
    const date     = formatDate(post.date);
    const category = post._embedded?.['wp:term']?.[0]?.[0]?.name || '';
    const acf      = post.acf || {};
    const imgRow   = (Array.isArray(acf.content) ? acf.content : []).find(s => s.acf_fc_layout === 'image');
    // Prefer first ACF image (same as article hero) over WP featured media
    const thumb    = await resolveImgUrl(imgRow?.img || imgRow?.image)
                  || post._embedded?.['wp:featuredmedia']?.[0]?.source_url
                  || '';

    const thumbHtml = thumb
      ? `<img src="${thumb}" alt="${title.replace(/"/g,'&quot;')}" loading="lazy">`
      : `<div class="cv-card__thumb-placeholder"></div>`;

    return `<div class="cv-card" data-slug="${encodeURIComponent(slug)}" data-title="${title.replace(/"/g,'&quot;')}" data-date="${date}" data-thumb="${thumb.replace(/"/g,'&quot;')}" role="button" tabindex="0">
  <div class="cv-card__thumb">${thumbHtml}</div>
  <div class="cv-card__body">
    <div class="cv-card__meta">
      <p class="cv-card__title">${title}</p>
      ${category ? `<p class="cv-card__category">${category}</p>` : ''}
    </div>
    <span class="cv-card__arrow">${ARROW_SVG}</span>
  </div>
</div>`;
  }

  async function fetchArticleList() {
    const LIST_FIELDS = 'id,title,date,slug,acf,_links';
    // Priority order: dedicated CPT names first, then any other discovered CPT, posts as last resort
    const bases = ['articles', 'article'];
    try {
      const idx = await fetch(API.replace('/wp/v2', ''), { signal: AbortSignal.timeout(5000) }).then(r => r.ok ? r.json() : null);
      if (idx?.routes) {
        const SKIP = new Set([...bases, 'posts','pages','media','types','statuses','taxonomies',
          'tags','categories','users','comments','settings','themes','plugins','blocks',
          'block-renderer','search','batch','sidebars','widgets','widget-types','menus',
          'menu-items','menu-locations','templates','template-parts','global-styles',
          'navigation','font-families','font-collections','pattern-directory',
          'block-types','block-patterns','block-pattern-categories','projects','project']);
        const others = Object.keys(idx.routes)
          .map(p => p.match(/^\/wp\/v2\/([^/?(]+)$/)?.[1])
          .filter(b => b && !SKIP.has(b));
        bases.push(...others);
        console.log('[articles] trying bases:', bases);
      }
    } catch(e) {}
    bases.push('posts'); // final fallback — articles may live in standard posts

    for (const base of bases) {
      const r = await fetch(
        `${API}/${base}?per_page=20&_fields=${LIST_FIELDS}&_embed=true&acf_format=standard`,
        { signal: AbortSignal.timeout(10000) }
      ).catch(() => null);
      if (!r || !r.ok) {
        const code = r ? (await r.json().catch(() => ({}))).code : null;
        if (!r || code === 'rest_no_route') continue;
        throw new Error(`HTTP ${r.status}${code ? ' · ' + code : ''}`);
      }
      const posts = await r.json();
      if (!Array.isArray(posts) || posts.length === 0) continue;
      // Confirm these are articles by checking for ACF fields
      const hasAcf = posts.some(p => p.acf && (p.acf.test !== undefined || p.acf.content !== undefined));
      if (!hasAcf && base === 'posts') continue; // posts but no article ACF — skip
      console.log(`[articles] loaded ${posts.length} items from /${base}`);
      return posts;
    }
    throw new Error('No articles found — check the WordPress REST API settings for the articles post type');
  }

  fetchArticleList().then(async posts => {
    const list  = document.getElementById('articleList');
    const count = document.getElementById('articleCount');
    if (posts.length === 0) { list.innerHTML = '<div class="articles-empty">No articles yet.</div>'; return; }
    count.textContent = posts.length + (posts.length === 1 ? ' article' : ' articles');
    list.innerHTML = (await Promise.all(posts.map(buildCard))).join('');
  }).catch(err => {
    console.error('[articles] fetch failed:', err);
    const msg = err.name === 'TimeoutError' ? 'Request timed out.' : (err.message || 'network error');
    document.getElementById('articleList').innerHTML =
      `<div class="articles-empty">Could not load articles — ${msg}</div>`;
  });

  // === ARTICLE BOTTOM SHEET ===
  const artSheet    = document.getElementById('artSheet');
  const artScroll   = document.getElementById('artSheetScroll');
  const artBackdrop = document.getElementById('artBackdrop');
  const artBackBtn  = document.getElementById('artBackBtn');
  const heroWrap    = document.querySelector('.art-hero__img-wrap');
  let artCurrentSlug = null;

  function _openSheetDOM(slug, title, date, thumb) {
    artCurrentSlug = slug;
    document.getElementById('artHeroTitle').textContent = title;
    document.getElementById('artHeroDate').textContent  = date;
    const p = document.getElementById('artHeroImgPortrait');
    const l = document.getElementById('artHeroImgLandscape');
    if (thumb) {
      p.src = thumb; p.style.display = '';
      l.src = thumb; l.style.display = '';
    } else {
      p.style.display = 'none'; l.style.display = 'none';
    }
    document.getElementById('artSheetContent').innerHTML = '<div class="art-content-loading">Loading…</div>';
    artSheet.classList.add('is-open');
    artBackdrop.classList.add('is-active');
    document.body.style.overflow = 'hidden';
    artScroll.scrollTop = 0;
  }

  function openSheet(slug, title, date, thumb) {
    _openSheetDOM(slug, title, date, thumb);
    fetchAndRenderArticle(slug);
  }

  function closeSheet() {
    artSheet.classList.remove('is-open');
    artBackdrop.classList.remove('is-active');
    document.body.style.overflow = '';
    artCurrentSlug = null;
  }

  function openSheetWithVT(card) {
    const slug  = decodeURIComponent(card.dataset.slug);
    const title = card.dataset.title || '';
    const date  = card.dataset.date  || '';
    const thumb = card.dataset.thumb || '';
    const thumbEl = card.querySelector('.cv-card__thumb');

    if (!document.startViewTransition || !thumbEl) {
      openSheet(slug, title, date, thumb);
      return;
    }

    artCurrentSlug = slug;
    thumbEl.style.viewTransitionName = 'art-hero';

    const vt = document.startViewTransition(() => {
      thumbEl.style.viewTransitionName = '';
      heroWrap.style.viewTransitionName = 'art-hero';
      artSheet.style.transition = 'none';
      artBackdrop.style.transition = 'none';
      _openSheetDOM(slug, title, date, thumb);
    });

    vt.ready.then(() => fetchAndRenderArticle(slug));

    vt.finished.then(() => {
      heroWrap.style.viewTransitionName = '';
      artSheet.style.transition = '';
      artBackdrop.style.transition = '';
    }).catch(() => {
      heroWrap.style.viewTransitionName = '';
      artSheet.style.transition = '';
      artBackdrop.style.transition = '';
    });
  }

  function closeSheetWithVT() {
    if (!artCurrentSlug) { closeSheet(); return; }

    const slug       = artCurrentSlug;
    const matchCard  = document.querySelector(`.cv-card[data-slug="${encodeURIComponent(slug)}"]`);
    const matchThumb = matchCard?.querySelector('.cv-card__thumb');

    if (!document.startViewTransition || !matchThumb) {
      closeSheet();
      return;
    }

    heroWrap.style.viewTransitionName = 'art-hero';

    const vt = document.startViewTransition(() => {
      heroWrap.style.viewTransitionName = '';
      matchThumb.style.viewTransitionName = 'art-hero';
      artSheet.style.transition = 'none';
      artBackdrop.style.transition = 'none';
      closeSheet();
    });

    vt.finished.then(() => {
      matchThumb.style.viewTransitionName = '';
      artSheet.style.transition = '';
      artBackdrop.style.transition = '';
    }).catch(() => {
      matchThumb.style.viewTransitionName = '';
      artSheet.style.transition = '';
      artBackdrop.style.transition = '';
    });
  }

  artBackBtn.addEventListener('click', closeSheetWithVT);
  artBackdrop.addEventListener('click', closeSheetWithVT);
  document.addEventListener('keydown', e => { if (e.key === 'Escape' && artCurrentSlug) closeSheetWithVT(); });

  // Click on article card
  document.getElementById('articleList').addEventListener('click', e => {
    const card = e.target.closest('.cv-card[data-slug]');
    if (!card) return;
    openSheetWithVT(card);
  });
  document.getElementById('articleList').addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' ') {
      const card = e.target.closest('.cv-card[data-slug]');
      if (card) { e.preventDefault(); openSheetWithVT(card); }
    }
  });

  // Swipe-to-close (no VT — gesture already provides visual feedback)
  (function() {
    let sy = 0, dy = 0, vy = 0, pt = 0, active = false;
    artSheet.addEventListener('touchstart', e => {
      if (artScroll.scrollTop > 0) return;
      const t = e.touches[0]; sy = t.clientY; dy = 0; vy = 0; pt = e.timeStamp; active = true;
    }, { passive: true });
    artSheet.addEventListener('touchmove', e => {
      if (!active) return;
      const t = e.touches[0]; const d = t.clientY - sy;
      if (d <= 0) { active = false; return; }
      e.preventDefault();
      vy = (d - dy) / Math.max(e.timeStamp - pt, 1) * 16;
      dy = d; pt = e.timeStamp;
      artSheet.style.transition = 'none';
      artSheet.style.transform  = `translateY(${dy}px)`;
    }, { passive: false });
    artSheet.addEventListener('touchend', () => {
      if (!active) return; active = false;
      artSheet.style.transition = ''; artSheet.style.transform = '';
      if (dy > 100 || vy > 8) closeSheet();
    });
    artSheet.addEventListener('touchcancel', () => {
      active = false; artSheet.style.transition = ''; artSheet.style.transform = '';
    });
  })();

  // Fetch and render article content into sheet
  async function resolveArtImg(img) {
    if (!img) return '';
    if (typeof img === 'object') return img.url || img.source_url || '';
    const id = parseInt(img, 10);
    if (!id) return typeof img === 'string' ? img : '';
    try {
      const r = await fetch(`${API}/media/${id}?_fields=source_url`, { signal: AbortSignal.timeout(6000) });
      if (r.ok) return (await r.json()).source_url || '';
    } catch(e) {}
    return '';
  }

  async function renderArtBlocks(sections, test2) {
    const out = [];
    if (test2) out.push(`<div class="art-block"><div class="art-block-text"><p>${test2}</p></div></div>`);
    for (const s of sections) {
      const layout = (s.acf_fc_layout || '').toLowerCase();
      if (layout === 'image' || layout === 'img' || layout === 'photo') {
        const url = await resolveArtImg(s.img || s.image || s.photo || null);
        if (url) out.push(`<div class="art-block"><img src="${url}" alt="${s.caption||''}" loading="lazy"></div>`);
      } else {
        let html = s.wysiwyg || s.text || (typeof s.content === 'string' ? s.content : '') || s.html || s.body || '';
        if (!html) {
          for (const [k, v] of Object.entries(s)) {
            if (k !== 'acf_fc_layout' && typeof v === 'string' && v.trim()) { html = v; break; }
          }
        }
        if (html) out.push(`<div class="art-block"><div class="art-block-text">${html}</div></div>`);
      }
    }
    return out.join('');
  }

  async function fetchAndRenderArticle(slug) {
    const FIELDS = 'id,title,date,excerpt,acf,content,_links';
    const bases  = ['articles', 'article', 'posts'];
    try {
      let post = null;
      for (const base of bases) {
        for (const acfSuffix of ['&acf_format=standard', '']) {
          const r = await fetch(
            `${API}/${base}?slug=${encodeURIComponent(slug)}&_fields=${FIELDS}&_embed=true${acfSuffix}`,
            { signal: AbortSignal.timeout(10000) }
          ).catch(() => null);
          if (!r || !r.ok) {
            const body = r ? await r.json().catch(() => ({})) : {};
            if (!r || body.code === 'rest_no_route') break;
            continue;
          }
          const data = await r.json();
          const candidate = Array.isArray(data) ? data[0] : data;
          if (!candidate?.id) continue;
          const hasAcf = candidate.acf && Object.keys(candidate.acf).length > 0;
          if (hasAcf) { post = candidate; break; }
          if (!post) post = candidate;
        }
        if (post?.id) break;
      }

      if (!post) throw new Error('Article not found');
      if (slug !== artCurrentSlug) return;

      const acf = post.acf || {};
      const check = v => Array.isArray(v) && v.length > 0 && typeof v[0] === 'object' && 'acf_fc_layout' in v[0];
      const flexRows = check(acf.content) ? acf.content : (Object.values(acf).find(check) || []);

      const blocks = await renderArtBlocks(flexRows, acf.test2 || '');
      const fallback = (post.content?.rendered || '').trim();
      const html = blocks || (fallback ? `<div class="art-block"><div class="art-block-text">${fallback}</div></div>` : '');

      if (slug !== artCurrentSlug) return;
      document.getElementById('artSheetContent').innerHTML =
        html || '<div class="art-content-loading">No content available.</div>';

      // Update hero image with best available source
      const featuredUrl = post._embedded?.['wp:featuredmedia']?.[0]?.source_url || '';
      const imgRow = flexRows.find(s => ['image','img','photo'].includes((s.acf_fc_layout||'').toLowerCase()));
      const heroUrl = featuredUrl || await resolveArtImg(imgRow?.img || imgRow?.image || null);
      if (heroUrl && slug === artCurrentSlug) {
        const p = document.getElementById('artHeroImgPortrait');
        const l = document.getElementById('artHeroImgLandscape');
        p.src = heroUrl; p.style.display = '';
        l.src = heroUrl; l.style.display = '';
      }
    } catch(e) {
      if (slug !== artCurrentSlug) return;
      document.getElementById('artSheetContent').innerHTML =
        `<div class="art-content-loading">Could not load article — ${e.message || 'network error'}</div>`;
    }
  }
</script>
</body>
</html>
