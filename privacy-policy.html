<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Privacy Policy — Jana Gramlich</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;1,9..40,400&display=swap" rel="stylesheet">
  <style>
    /* === RESET === */
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    html { -webkit-font-smoothing:antialiased; }
    body {
      font-family:'DM Sans', sans-serif;
      font-optical-sizing:auto;
      background:#171717;
      color:#fff;
      overflow-x:hidden;
    }
    a { text-decoration:none; color:inherit; }
    button { cursor:pointer; border:none; background:none; font-family:inherit; }

    /* === NAV === */
    .nav {
      position:fixed; top:4px;
      left:50%; transform:translateX(-50%);
      width:189px;
      border-radius:24px;
      background:rgba(255,255,255,0.15);
      backdrop-filter:blur(20px) saturate(180%);
      -webkit-backdrop-filter:blur(20px) saturate(180%);
      overflow:hidden;
      z-index:100;
      transition:width .4s cubic-bezier(.4,0,.2,1);
    }
    .nav.is-open { width:min(calc(100vw - 16px), 560px); }
    .nav::before {
      content:'';
      position:absolute;
      width:164%; height:227%;
      left:-28%; top:-8%;
      background:url('images/nav-bg.png') center/cover no-repeat;
      opacity:0.65;
      transition:opacity .4s cubic-bezier(.4,0,.2,1);
      z-index:-1;
    }
    .nav.is-open::before { opacity:0.65; }
    .nav__bar {
      height:33px; display:flex; align-items:center;
      padding:0 16px; cursor:pointer;
      width:189px; margin:0 auto;
    }
    .nav__logo {
      font-size:12px; font-weight:500; line-height:1; color:#fff;
      letter-spacing:0.56px; text-transform:uppercase; white-space:nowrap;
    }
    .nav__menu {
      display:flex; flex-direction:row; align-items:center; gap:3px;
      width:15px; height:13px; flex-shrink:0; position:relative;
      margin-left:auto;
    }
    .nav__menu span {
      display:block; width:3px; height:3px; border-radius:50%;
      background:#fff; flex-shrink:0;
      transition:opacity .25s ease;
    }
    .nav__menu::after {
      content:'×'; position:absolute; inset:0;
      display:flex; align-items:center; justify-content:center;
      font-size:13px; line-height:1; color:#fff;
      opacity:0; transition:opacity .25s ease;
    }
    .nav.is-open .nav__menu span { opacity:0; }
    .nav.is-open .nav__menu::after { opacity:1; }
    .nav__expand {
      display:grid; grid-template-rows:0fr;
      transition:grid-template-rows .4s cubic-bezier(.4,0,.2,1);
    }
    .nav.is-open .nav__expand { grid-template-rows:1fr; }
    .nav__expand-inner { overflow:hidden; }

    .nav__links { padding:32px 24px 0; display:flex; flex-direction:column; }
    .nav__link {
      display:block;
      font-size:32px; font-weight:400; color:#fff; line-height:1.4;
      opacity:0; transform:translateY(8px);
      transition:opacity .2s ease, transform .25s ease, color .15s;
    }
    .nav.is-open .nav__link {
      opacity:1; transform:translateY(0);
      transition:opacity .2s ease .22s, transform .25s ease .22s, color .15s;
    }
    .nav__link:hover { color:rgba(255,255,255,.5); }

    .nav__divider {
      height:1px; background:rgba(255,255,255,0.12);
      margin:16px 0;
      opacity:0; transition:opacity .2s ease;
    }
    .nav.is-open .nav__divider { opacity:1; transition:opacity .2s ease .32s; }

    .nav__contact {
      padding:40px 24px 24px;
      opacity:0; transform:translateY(6px);
      transition:opacity .2s ease, transform .25s ease;
    }
    .nav.is-open .nav__contact {
      opacity:1; transform:translateY(0);
      transition:opacity .2s ease .34s, transform .25s ease .34s;
    }
    .nav__contact-label { font-size:12px; font-weight:500; color:#fff; letter-spacing:0.48px; text-transform:uppercase; }
    .nav__contact-email { display:block; font-size:16px; font-weight:500; color:#6b6b6b; margin-top:4px; }
    .nav__linkedin {
      display:inline-flex; align-items:center; justify-content:center;
      background:#acb0ff; color:#171717;
      border-radius:999px; padding:8px 10px;
      font-size:12px; font-weight:500; letter-spacing:0.48px; text-transform:uppercase;
      margin-top:40px;
    }

    /* === CONTENT === */
    .imprint-content {
      width:100%; max-width:580px;
      margin-left:auto; margin-right:auto;
      padding:100px 24px 80px;
    }

    .imprint-eyebrow {
      font-size:12px; font-weight:500; color:rgba(255,255,255,0.35);
      letter-spacing:0.48px; text-transform:uppercase;
      margin-bottom:32px;
    }

    .imprint-content h1 {
      font-size:21px; font-weight:400; color:#6b6b6b;
      line-height:1.4; margin-bottom:48px;
    }

    .imprint-content h2 {
      font-size:12px; font-weight:500; color:rgba(255,255,255,0.35);
      letter-spacing:0.48px; text-transform:uppercase;
      margin-top:32px; margin-bottom:8px;
    }

    .imprint-content p {
      font-size:16px; font-weight:400; color:#6b6b6b;
      line-height:1.65;
    }
    .imprint-content p + p { margin-top:12px; }

    .imprint-content ul, .imprint-content ol {
      font-size:16px; font-weight:400; color:#6b6b6b;
      line-height:1.65; padding-left:20px; margin-top:8px;
    }
    .imprint-content li + li { margin-top:6px; }

    .imprint-content a {
      color:#6b6b6b;
      text-decoration:underline;
      text-underline-offset:3px;
    }
    .imprint-content a:hover { color:#fff; }

    .imprint-divider {
      border:none;
      border-top:1px solid rgba(255,255,255,0.12);
      margin:40px 0 0;
    }

    .imprint-footer {
      padding-top:40px;
      font-size:12px; font-weight:500; color:rgba(255,255,255,0.35);
      letter-spacing:0.48px; text-transform:uppercase;
    }

    /* WP content resets */
    #privacy-body h1 { font-size:21px; font-weight:400; color:#6b6b6b; line-height:1.4; margin-bottom:48px; }
    #privacy-body h2 { font-size:12px; font-weight:500; color:rgba(255,255,255,0.35); letter-spacing:0.48px; text-transform:uppercase; margin-top:32px; margin-bottom:8px; }
    #privacy-body h3 { font-size:12px; font-weight:500; color:rgba(255,255,255,0.35); letter-spacing:0.48px; text-transform:uppercase; margin-top:24px; margin-bottom:8px; }
    #privacy-body p { font-size:16px; font-weight:400; color:#6b6b6b; line-height:1.65; }
    #privacy-body p + p { margin-top:12px; }
    #privacy-body ul, #privacy-body ol { font-size:16px; color:#6b6b6b; line-height:1.65; padding-left:20px; margin-top:8px; }
    #privacy-body li + li { margin-top:6px; }
    #privacy-body a { color:#6b6b6b; text-decoration:underline; text-underline-offset:3px; }
    #privacy-body a:hover { color:#fff; }
    #privacy-body strong { font-weight:500; }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav class="nav" id="mainNav">
    <div class="nav__bar">
      <a href="index.html" class="nav__logo">Jana Gramlich</a>
      <div class="nav__menu" aria-hidden="true"><span></span><span></span><span></span></div>
    </div>
    <div class="nav__expand">
      <div class="nav__expand-inner">
        <div class="nav__links">
          <a href="index.html#work" class="nav__link">Work</a>
          <a href="index.html#about" class="nav__link">About</a>
          <a href="archive.html" class="nav__link">Archive</a>
        </div>
        <div class="nav__contact">
          <p class="nav__contact-label">Contact</p>
          <a href="mailto:hello@janagramlich.com" class="nav__contact-email">hello@janagramlich.com</a>
          <a href="https://www.linkedin.com/in/jana-gramlich-4646991a2/" class="nav__linkedin" target="_blank" rel="noopener">LinkedIn</a>
        </div>
      </div>
    </div>
  </nav>

  <!-- CONTENT -->
  <div class="imprint-content">
    <p class="imprint-eyebrow">Legal</p>
    <div id="privacy-body">
      <h1>Privacy Policy</h1>
      <p style="color:rgba(255,255,255,0.2)">Loading…</p>
    </div>
    <hr class="imprint-divider">
    <p class="imprint-footer" id="privacy-footer"></p>
  </div>

  <script>
    const nav = document.getElementById('mainNav');
    nav.addEventListener('mouseenter', () => nav.classList.add('is-open'));
    let _mlSuppress = false;
    nav.addEventListener('mouseleave', () => { if (!_mlSuppress) nav.classList.remove('is-open'); });
    nav.addEventListener('touchend', () => { _mlSuppress = true; setTimeout(() => { _mlSuppress = false; }, 600); }, { passive: true });
    nav.querySelector('.nav__logo').addEventListener('touchend', e => {
      if (!nav.classList.contains('is-open')) { e.preventDefault(); nav.classList.add('is-open'); }
    });
    nav.querySelector('.nav__logo').addEventListener('click', e => {
      if (!nav.classList.contains('is-open')) { e.preventDefault(); nav.classList.add('is-open'); }
    });
    nav.querySelector('.nav__menu').addEventListener('click', e => {
      e.stopPropagation();
      nav.classList.toggle('is-open');
    });
    nav.addEventListener('click', e => {
      if (e.pointerType !== 'touch') return;
      const onBar = e.target.closest('.nav__bar');
      const isOpen = nav.classList.contains('is-open');
      if (onBar && !isOpen) { e.preventDefault(); nav.classList.add('is-open'); }
      else if (onBar && !e.target.closest('a')) nav.classList.remove('is-open');
    });
    document.addEventListener('click', e => {
      if (e.pointerType === 'touch' && !e.target.closest('#mainNav')) nav.classList.remove('is-open');
    });

    // Fetch privacy policy content from WP backend
    (async function() {
      const base = 'https://janagramlich.com/wp-json/wp/v2/pages';
      const slugs = ['privacy-policy', 'datenschutz', 'datenschutzerklarung', 'datenschutzerklärung'];
      let page = null;
      for (const slug of slugs) {
        try {
          const res = await fetch(`${base}?slug=${encodeURIComponent(slug)}&_fields=title,content,modified`);
          const data = await res.json();
          if (data[0]) { page = data[0]; break; }
        } catch(e) {}
      }
      const body = document.getElementById('privacy-body');
      const footer = document.getElementById('privacy-footer');
      if (page) {
        const title = page.title?.rendered || 'Privacy Policy';
        const content = page.content?.rendered || '';
        body.innerHTML = `<h1>${title}</h1>${content}`;
        if (page.modified) {
          const d = new Date(page.modified);
          footer.textContent = 'Zuletzt aktualisiert: ' + d.toLocaleDateString('de-DE', { day:'numeric', month:'long', year:'numeric' });
        }
      } else {
        body.innerHTML = '<h1>Privacy Policy</h1><p>Content could not be loaded. Please try again later.</p>';
      }
    })();
  </script>

</body>
</html>
