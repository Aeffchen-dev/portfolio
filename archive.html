<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <link rel="canonical" href="https://portfolio.janagramlich.com/archive.html">
  <meta property="og:type" content="website">

  <meta property="og:description" content="A visual archive of work, experiments and inspiration by Jana Gramlich, product designer based in Berlin.">

  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;1,9..40,400&display=swap" rel="stylesheet">
  <style>
    /* === RESET === */
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    /* No overflow:hidden on html — breaks position:fixed on iOS Safari */
    html  { width:100%; min-height:100lvh; background:#171717; }
    body  { width:100%; min-height:100lvh; background:#171717; overflow:hidden; }
    body { font-family:'DM Sans', sans-serif; font-optical-sizing:auto; color:#fff; }
    img { display:block; }
    a { text-decoration:none; color:inherit; }

    /* === NAV === */
    .nav {
      position:fixed; top:4px;
      left:50%; transform:translateX(-50%);
      width:calc(100vw - 16px);
      border-radius:0;
      background:transparent;
      backdrop-filter:none;
      -webkit-backdrop-filter:none;
      overflow:hidden;
      z-index:100;
    }
    .nav.is-open { width:min(calc(100vw - 32px), 400px); border-radius:24px; backdrop-filter:blur(20px) saturate(180%); -webkit-backdrop-filter:blur(20px) saturate(180%); }
    @media (min-width:640px) and (max-width:1023px) { .nav.is-open { width:calc(100vw - 32px); } }
    .nav::before {
      content:'';
      position:absolute;
      width:164%; height:227%;
      left:-28%; top:-8%;
      background:url('images/nav-bg.png') center/cover no-repeat;
      opacity:var(--nav-bg-opacity, 0);
      z-index:-1;
    }
    .nav.is-open::before { transition:opacity .4s cubic-bezier(.4,0,.2,1); }
    .nav.is-open::before { opacity:0.65; }
    .nav__bar {
      height:33px; display:flex; align-items:center;
      padding:0 16px; cursor:pointer;
      width:100%;
    }
    .nav.is-open .nav__bar {
      padding-left:calc((100% - var(--pill-w, 168px)) / 2 + 16px);
      padding-right:calc((100% - var(--pill-w, 168px)) / 2 + 16px);
    }
    .nav__logo {
      font-size:12px; font-weight:500; line-height:1; color:#fff;
      letter-spacing:0.56px; text-transform:uppercase; white-space:nowrap;
    }
    .nav__menu {
      display:flex; flex-direction:row; align-items:center; gap:3px;
      width:15px; height:13px; flex-shrink:0; position:relative;
      margin-left:auto; overflow:visible;
      transition:transform .2s cubic-bezier(.4,0,.2,1);
    }
    .nav__menu:hover { transform:scale(1.15); }
    .nav__menu:active { transform:scale(0.9); }
    .nav__menu > span:not(.nav__close-icon) {
      display:block; width:3px; height:3px; border-radius:50%;
      background:#fff; flex-shrink:0;
      transition:opacity .25s ease;
    }
    .nav__close-icon {
      position:absolute; inset:0;
      display:flex; align-items:center; justify-content:center;
      opacity:0; transition:opacity .25s ease, transform .25s cubic-bezier(.4,0,.2,1); color:#fff;
      transform:rotate(-45deg) scale(0.7);
    }
    .nav.is-open .nav__menu > span:not(.nav__close-icon) { opacity:0; }
    .nav.is-open .nav__close-icon { opacity:1; transform:rotate(0deg) scale(1); }
    .nav__expand {
      display:grid; grid-template-rows:0fr;
      transition:grid-template-rows .4s cubic-bezier(.4,0,.2,1);
    }
    .nav.is-open .nav__expand { padding-top:33px; grid-template-rows:1fr; }
    .nav__expand-inner { overflow:hidden; }
    .nav__links { padding:32px 16px 0; display:flex; flex-direction:column; }
    .nav__link {
      display:block;
      font-size:32px; font-weight:400; color:#fff; line-height:1.4;
      opacity:0; transform:translateY(8px);
      transition:opacity .2s ease, transform .25s ease, color .15s;
    }
    .nav.is-open .nav__link {
      opacity:1; transform:translateY(0);
      transition:opacity .2s ease .22s, transform .25s ease .22s, color .15s;
    }
    .nav__link:hover { color:rgba(255,255,255,.5); }
    .nav__link.is-current { color:rgba(255,255,255,.35); pointer-events:none; }
    .nav__divider {
      height:1px; background:rgba(255,255,255,0.12);
      margin:16px 0;
      opacity:0; transition:opacity .2s ease;
    }
    .nav.is-open .nav__divider { opacity:1; transition:opacity .2s ease .32s; }
    .nav__contact {
      padding:40px 16px 24px;
      opacity:0; transform:translateY(6px);
      transition:opacity .2s ease, transform .25s ease;
    }
    .nav.is-open .nav__contact {
      opacity:1; transform:translateY(0);
      transition:opacity .2s ease .34s, transform .25s ease .34s;
    }
    .nav__contact-label { font-size:12px; font-weight:500; color:#fff; letter-spacing:0.48px; text-transform:uppercase; }
    .nav__contact-email { display:block; font-size:16px; font-weight:500; color:#989898; margin-top:4px; }
    .nav__linkedin {
      display:inline-flex; align-items:center; justify-content:center;
      background:#acb0ff; color:#171717;
      border-radius:999px; padding:8px 10px;
      font-size:12px; font-weight:500; letter-spacing:0.48px; text-transform:uppercase;
      margin-top:40px;
      transition:opacity .2s ease;
    }
    .nav__linkedin:hover { opacity:0.8; }

    /* === CANVAS === */
    #canvas {
      position:fixed;
      top:0; left:0;
      cursor:grab;
      user-select:none;
      -webkit-user-select:none;
      touch-action:none;
    }
    #canvas.is-dragging { cursor:grabbing; }

    /* === TILES === */
    .tile {
      position:absolute;
      top:0; left:0;
      border-radius:12px;
      overflow:hidden;
      will-change:transform;
      background:#2a2a2a;
      cursor:pointer;
      transition:opacity .15s ease;
    }
    .tile:active { opacity:0.85; }
    .tile img {
      width:100%; height:100%;
      object-fit:cover;
      display:block;
      pointer-events:none;
      user-select:none;
      -webkit-user-select:none;
      -webkit-user-drag:none;
    }
    @media (min-width:640px) { .nav { top:8px; } }

    /* === LIGHTBOX === */
    .lightbox {
      position:fixed; inset:0; z-index:200;
      display:flex; align-items:center; justify-content:center;
      background:rgba(0,0,0,0);
      pointer-events:none;
      transition:background .3s ease;
      /* Prevent iOS Safari scroll-through */
      touch-action:none;
      -webkit-touch-callout:none;
    }
    .lightbox.is-open {
      background:rgba(0,0,0,0.92);
      pointer-events:auto;
    }
    .lightbox__inner {
      position:relative;
      max-width:min(92vw, 560px);
      max-height:90dvh;
      display:flex; align-items:center; justify-content:center;
      transform:scale(0.92) translateY(10px);
      opacity:0;
      transition:transform .35s cubic-bezier(0.32,0.72,0,1), opacity .3s ease;
    }
    .lightbox.is-open .lightbox__inner {
      transform:scale(1) translateY(0);
      opacity:1;
    }
    #lightboxImg {
      max-width:100%; max-height:90dvh;
      object-fit:contain;
      border-radius:12px;
      display:block;
    }
    .lightbox__close {
      position:absolute; top:-40px; right:-4px;
      width:32px; height:32px;
      display:flex; align-items:center; justify-content:center;
      color:rgba(255,255,255,0.7);
      cursor:pointer; border:none; background:none; padding:0;
      transition:color .2s ease, transform .2s ease;
    }
    .lightbox__close:hover { color:#fff; transform:scale(1.1); }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav class="nav" id="mainNav">
    <div class="nav__bar">
      <a href="index.html" class="nav__logo">Jana Gramlich</a>
      <div class="nav__menu" aria-hidden="true"><span></span><span></span><span></span><span class="nav__close-icon"><svg width="7" height="7" viewBox="0 0 7 7" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" xmlns="http://www.w3.org/2000/svg"><line x1="1" y1="1" x2="6" y2="6"/><line x1="6" y1="1" x2="1" y2="6"/></svg></span></div>
    </div>
    <div class="nav__expand">
      <div class="nav__expand-inner">
        <div class="nav__links">
          <a href="index.html#work" class="nav__link">Work</a>
          <a href="index.html#about" class="nav__link">About</a>
          <a href="archive.html" class="nav__link is-current">Archive</a>
          <a href="articles.html" class="nav__link">Articles</a>
        </div>
        <div class="nav__divider"></div>
        <div class="nav__contact">
          <p class="nav__contact-label">Contact</p>
          <a href="mailto:hello@janagramlich.com" class="nav__contact-email">hello@janagramlich.com</a>
          <a href="https://www.linkedin.com/in/jana-gramlich-4646991a2/" class="nav__linkedin" target="_blank" rel="noopener">LinkedIn</a>
        </div>
      </div>
    </div>
  </nav>

  <!-- INFINITE CANVAS -->
  <div id="canvas"></div>

  <!-- LIGHTBOX -->
  <div id="lightbox" class="lightbox" role="dialog" aria-modal="true" aria-label="Image preview">
    <div class="lightbox__inner">
      <img id="lightboxImg" src="" alt="">
      <button class="lightbox__close" id="lightboxClose" aria-label="Close">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" xmlns="http://www.w3.org/2000/svg"><line x1="1" y1="1" x2="13" y2="13"/><line x1="13" y1="1" x2="1" y2="13"/></svg>
      </button>
    </div>
  </div>

  <script>
    // === NAV ===
    const nav = document.getElementById('mainNav');
    nav.addEventListener('mouseenter', () => nav.classList.add('is-open'));
    let _mlSuppress = false;
    nav.addEventListener('mouseleave', () => { if (!_mlSuppress) nav.classList.remove('is-open'); });
    nav.addEventListener('touchend', () => { _mlSuppress = true; setTimeout(() => { _mlSuppress = false; }, 600); }, { passive: true });
    nav.querySelector('.nav__logo').addEventListener('touchend', e => {
      if (!nav.classList.contains('is-open')) { e.preventDefault(); nav.classList.add('is-open'); }
    });
    nav.querySelector('.nav__logo').addEventListener('click', e => {
      if (!nav.classList.contains('is-open')) { e.preventDefault(); nav.classList.add('is-open'); }
    });
    nav.querySelector('.nav__menu').addEventListener('click', e => {
      e.stopPropagation();
      nav.classList.toggle('is-open');
    });
    nav.addEventListener('click', e => {
      if (e.pointerType !== 'touch') return;
      const onBar = e.target.closest('.nav__bar');
      const isOpen = nav.classList.contains('is-open');
      if (onBar && !isOpen) { e.preventDefault(); nav.classList.add('is-open'); }
      else if (onBar && !e.target.closest('a')) nav.classList.remove('is-open');
    });
    document.addEventListener('click', e => {
      if (e.pointerType === 'touch' && !e.target.closest('#mainNav')) nav.classList.remove('is-open');
    });

    // Collapsed pill state — no page scroll on archive, always show pill
    (function() {
      const navBar  = nav.querySelector('.nav__bar');
      const navMenu = nav.querySelector('.nav__menu');
      const dots    = [...nav.querySelectorAll('.nav__menu span:not(.nav__close-icon)')];
      const logoEl  = navBar.querySelector('.nav__logo');

      function setPillState() {
        const targetW = logoEl.offsetWidth + 48;
        nav.style.width           = targetW + 'px';
        nav.style.top             = window.innerWidth >= 640 ? '8px' : '4px';
        nav.style.borderRadius    = '24px';
        nav.style.background      = 'rgba(255,255,255,0.05)';
        nav.style.setProperty('--nav-bg-opacity','0.65');
        nav.style.backdropFilter       = 'blur(20px) saturate(180%)';
        nav.style.webkitBackdropFilter = 'blur(20px) saturate(180%)';
        nav.style.setProperty('--pill-w', targetW + 'px');
        navBar.style.paddingLeft  = '16px';
        navBar.style.paddingRight = '16px';
        navBar.style.paddingTop   = '0';
        navBar.style.paddingBottom= '0';
        dots[0].style.opacity     = '0';
        dots[2].style.opacity     = '0';
        dots[0].style.transform   = 'translateX(6px)';
        dots[2].style.transform   = 'translateX(-6px)';
        dots[1].style.background  = 'rgb(172,176,255)';
        dots[1].style.width       = '8px';
        dots[1].style.height      = '8px';
        navMenu.style.width       = '8px';
      }

      const EASE      = 'cubic-bezier(.4,0,.2,1)';
      const NAV_TRANS = `width .4s ${EASE}, top .4s ${EASE}, border-radius .4s ${EASE}, background .4s ${EASE}, backdrop-filter .4s ${EASE}, -webkit-backdrop-filter .4s ${EASE}`;

      new MutationObserver(() => {
        nav.style.transition = NAV_TRANS;
        void nav.offsetHeight;
        if (nav.classList.contains('is-open')) {
          nav.style.width = ''; nav.style.top = ''; nav.style.borderRadius = '';
          nav.style.background = ''; nav.style.backdropFilter = ''; nav.style.webkitBackdropFilter = '';
          navBar.style.paddingLeft = ''; navBar.style.paddingRight = '';
          navBar.style.paddingTop  = ''; navBar.style.paddingBottom = '';
          dots.forEach(d => { d.style.opacity=''; d.style.transform=''; d.style.background=''; d.style.width=''; d.style.height=''; });
          navMenu.style.width = '8px';
        } else {
          setPillState();
        }
        setTimeout(() => { nav.style.transition = ''; }, 450);
      }).observe(nav, { attributes:true, attributeFilter:['class'] });

      window.addEventListener('resize', setPillState);
      setPillState();
    })();

    // === LIGHTBOX ===
    const lightbox    = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightboxImg');
    const lightboxClose = document.getElementById('lightboxClose');

    function openLightbox(src) {
      lightboxImg.src = src;
      lightbox.classList.add('is-open');
      // Prevent body scroll on iOS when lightbox is open
      document.body.style.overflow = 'hidden';
      document.body.style.touchAction = 'none';
    }
    function closeLightbox() {
      lightbox.classList.remove('is-open');
      document.body.style.overflow = '';
      document.body.style.touchAction = '';
      // Clear src after transition to avoid flash on next open
      setTimeout(() => { if (!lightbox.classList.contains('is-open')) lightboxImg.src = ''; }, 350);
    }

    lightboxClose.addEventListener('click', closeLightbox);
    lightboxClose.addEventListener('touchend', e => { e.preventDefault(); closeLightbox(); });

    // Close on backdrop tap (not on image itself)
    lightbox.addEventListener('pointerup', e => {
      if (e.target === lightbox || e.target === lightbox.querySelector('.lightbox__inner')) closeLightbox();
    });
    // iOS Safari: also handle touchend on backdrop
    lightbox.addEventListener('touchend', e => {
      if (e.target === lightbox || e.target === lightbox.querySelector('.lightbox__inner')) {
        e.preventDefault();
        closeLightbox();
      }
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape' && lightbox.classList.contains('is-open')) closeLightbox();
    });

    // === CANVAS ===
    const canvas = document.getElementById('canvas');

    // Use screen dimensions to cover full physical screen including behind browser bars (iOS)
    const CW = screen.width  || window.innerWidth;
    const CH = screen.height || window.innerHeight;
    canvas.style.width  = CW + 'px';
    canvas.style.height = CH + 'px';

    // Grid config — portrait tiles (9:19 ratio)
    const COLS   = 6;
    const ROWS   = 5;
    const BASE_W = 120;
    const BASE_G = 12;
    const mult   = CW < 640 ? 2.3 : 1.3;
    const scale  = CW / (COLS * (BASE_W + BASE_G)) * mult;
    const TILE_W = BASE_W * scale;
    const TILE_H = 253   * scale;
    const GAP    = BASE_G * scale;
    const RX     = COLS * (TILE_W + GAP);
    const RY     = ROWS * (TILE_H + GAP);

    // Only images that exist in the repo
    const AVAIL = [
      'p01','p02','p03','p04','p05','p06','p07',
      'p09','p10','p11','p12','p13','p14','p15','p16','p17','p18','p19',
      'p22','p23','p24','p25','p26','p27','p28','p29','p30',
      'p31','p32','p33','p34','p35','p36','p37','p38','p39','p40'
    ];
    const IMGS = AVAIL.map(n => `images/parallax/${n}.png`).sort(() => Math.random() - 0.5);

    const COL_PAR  = [0.82, 1.0, 1.18, 0.82, 1.0, 1.18];
    const COL_YOFF = [0, 0.5, 0.25, 0.75, 0.4, 0.15];

    const DEFS = [];
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const yo = COL_YOFF[c] * (TILE_H + GAP);
        DEFS.push({ x: c * (TILE_W + GAP), y: r * (TILE_H + GAP) + yo, w: TILE_W, h: TILE_H, c });
      }
    }

    const tiles = DEFS.map((def, i) => {
      const el  = document.createElement('div');
      el.className = 'tile';
      el.style.width  = def.w + 'px';
      el.style.height = def.h + 'px';
      const img = document.createElement('img');
      img.src = IMGS[i % IMGS.length];
      img.alt = '';
      img.draggable = false;
      el.appendChild(img);
      canvas.appendChild(el);
      return Object.assign({}, def, { el });
    });

    // State
    let ox = 0, oy = 0;
    let vx = 0, vy = 0;
    let dragging = false;
    let pointerDown = false;
    let isDragConfirmed = false;
    let tapStartX = 0, tapStartY = 0, tapStartT = 0;
    let lastX = 0, lastY = 0, lastT = 0;
    const DRAG_THRESHOLD = 8;
    const TAP_MAX_MS     = 300;

    // Auto-drift: slow diagonal pan when idle
    const DRIFT_VX = 0.18, DRIFT_VY = 0.10;
    let isAutoDrifting = true;
    let driftResumeTimer = null;
    function pauseDrift() {
      isAutoDrifting = false;
      clearTimeout(driftResumeTimer);
      driftResumeTimer = setTimeout(() => { isAutoDrifting = true; }, 2500);
    }

    function tilePos(t) {
      const cx  = CW / 2;
      const cy  = CH / 2;
      const p   = COL_PAR[t.c];
      const wx  = (((t.x + ox) % RX) + RX) % RX - RX / 2;
      const poy = oy * p + ox * (p - 1.0) * 0.3;
      const wy  = (((t.y + poy) % RY) + RY) % RY - RY / 2;
      return { x: cx + wx - t.w / 2, y: cy + wy - t.h / 2 };
    }

    function render() {
      tiles.forEach(t => {
        const p = tilePos(t);
        t.el.style.transform = `translate3d(${p.x}px,${p.y}px,0)`;
      });
      if (!dragging) {
        ox += vx; oy += vy;
        vx *= 0.97; vy *= 0.97;
        if (Math.abs(vx) < 0.01) vx = 0;
        if (Math.abs(vy) < 0.01) vy = 0;
        if (isAutoDrifting && Math.abs(vx) < 0.05 && Math.abs(vy) < 0.05) {
          ox += DRIFT_VX;
          oy += DRIFT_VY;
        }
      }
      requestAnimationFrame(render);
    }

    // Pointer events — setPointerCapture only after drag confirmed (iOS Safari compat)
    canvas.addEventListener('pointerdown', e => {
      if (lightbox.classList.contains('is-open')) return;
      pauseDrift();
      pointerDown      = true;
      isDragConfirmed  = false;
      tapStartX = lastX = e.clientX;
      tapStartY = lastY = e.clientY;
      tapStartT = lastT = performance.now();
      vx = 0; vy = 0;
    });

    canvas.addEventListener('pointermove', e => {
      if (!pointerDown) return;
      const dx = e.clientX - tapStartX;
      const dy = e.clientY - tapStartY;
      if (!isDragConfirmed && (Math.abs(dx) > DRAG_THRESHOLD || Math.abs(dy) > DRAG_THRESHOLD)) {
        isDragConfirmed = true;
        dragging = true;
        canvas.classList.add('is-dragging');
        // Capture only after drag confirmed — prevents iOS taps from being swallowed
        try { canvas.setPointerCapture(e.pointerId); } catch(_) {}
      }
      if (isDragConfirmed) {
        const pdx = e.clientX - lastX;
        const pdy = e.clientY - lastY;
        const dt  = Math.max(performance.now() - lastT, 1);
        vx = pdx / dt * 16;
        vy = pdy / dt * 16;
        ox += pdx; oy += pdy;
        lastX = e.clientX; lastY = e.clientY; lastT = performance.now();
      }
    });

    function endDrag(e) {
      if (!pointerDown) return;
      if (!isDragConfirmed) {
        // Tap detected — open lightbox if within time threshold
        const duration = performance.now() - tapStartT;
        if (duration < TAP_MAX_MS) {
          // Find the topmost tile element at the tap location
          const clientX = (e && e.clientX != null) ? e.clientX : tapStartX;
          const clientY = (e && e.clientY != null) ? e.clientY : tapStartY;
          const hit = document.elementsFromPoint(clientX, clientY);
          const tileEl = hit.find(el => el.classList.contains('tile'));
          if (tileEl) {
            const img = tileEl.querySelector('img');
            if (img && img.src) openLightbox(img.src);
          }
        }
      }
      pointerDown     = false;
      dragging        = false;
      isDragConfirmed = false;
      canvas.classList.remove('is-dragging');
    }

    canvas.addEventListener('pointerup',     endDrag);
    canvas.addEventListener('pointercancel', endDrag);

    // iOS Safari fallback: touchend fires reliably even without pointer capture
    canvas.addEventListener('touchend', e => {
      if (pointerDown && !isDragConfirmed) {
        const t = e.changedTouches[0];
        endDrag({ clientX: t.clientX, clientY: t.clientY });
        e.preventDefault(); // prevent ghost click
      }
    }, { passive: false });

    // Prevent iOS Safari page scroll/bounce on canvas
    canvas.addEventListener('touchstart', e => {
      if (!lightbox.classList.contains('is-open')) e.preventDefault();
    }, { passive: false });

    // Wheel / trackpad
    canvas.addEventListener('wheel', e => {
      e.preventDefault();
      ox -= e.deltaX;
      oy -= e.deltaY;
      vx = 0; vy = 0;
    }, { passive: false });

    render();
  </script>
</body>
</html>
