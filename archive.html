<!DOCTYPE html>
<html lang="en">

  <style>
    @view-transition { navigation: auto; }
    @font-face {
      font-family: 'HW Left Bold';
      src: url('images/HW Left Bold.woff') format('woff');
      font-weight: bold;
      font-style: normal;
      font-display: swap;
    }
    /* === RESET === */
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    html  { width:100%; min-height:100lvh; background:#171717; }
    body  { width:100%; min-height:100lvh; background:#171717; }
    body { font-family:'DM Sans', sans-serif; font-optical-sizing:auto; color:#fff; }
    img { display:block; }
    a { text-decoration:none; color:inherit; }

    /* === NAV === */
    .nav {
      position:fixed; top:4px;
      left:50%; transform:translateX(-50%);
      width:calc(100vw - 16px);
      border-radius:0;
      background:transparent;
      backdrop-filter:none;
      -webkit-backdrop-filter:none;
      overflow:hidden;
      z-index:100;
    }
    .nav.is-open { width:min(calc(100vw - 16px), 400px); border-radius:24px; backdrop-filter:blur(20px) saturate(180%); -webkit-backdrop-filter:blur(20px) saturate(180%); }
    .nav::before {
      content:'';
      position:absolute;
      width:164%; height:227%;
      left:-28%; top:-8%;
      background:url('images/IMG_2105.jpeg') center/cover no-repeat; filter:blur(60px); -webkit-filter:blur(60px);
      opacity:var(--nav-bg-opacity, 0);
      z-index:-1;
    }
    .nav.is-open::before { transition:opacity .4s cubic-bezier(.4,0,.2,1); }
    .nav.is-open::before { opacity:0.65; }
    .nav__bar {
      height:33px; display:flex; align-items:center;
      padding:0 16px; cursor:pointer;
      width:100%;
    }
    .nav.is-open .nav__bar {
      padding-left:calc((100% - var(--pill-w, 168px)) / 2 + 16px);
      padding-right:calc((100% - var(--pill-w, 168px)) / 2 + 16px);
    }
    .nav__logo {
      font-family:'HW Left Bold', sans-serif;
      font-size:12px; font-weight:bold; line-height:1; color:#fff;
      letter-spacing:0.56px; text-transform:uppercase; white-space:nowrap;
    }
    .nav__menu {
      display:flex; flex-direction:row; align-items:center; gap:3px;
      width:15px; height:13px; flex-shrink:0; position:relative;
      margin-left:auto; overflow:visible;
      transition:transform .2s cubic-bezier(.4,0,.2,1);
    }
    .nav__menu:hover { transform:scale(1.15); }
    .nav__menu:active { transform:scale(0.9); }
    .nav__menu > span:not(.nav__close-icon) {
      display:block; width:3px; height:3px; border-radius:50%;
      background:#fff; flex-shrink:0;
      transition:opacity .25s ease;
    }
    .nav__close-icon {
      position:absolute; inset:0;
      display:flex; align-items:center; justify-content:center;
      opacity:0; transition:opacity .25s ease, transform .25s cubic-bezier(.4,0,.2,1); color:#fff;
      transform:rotate(-45deg) scale(0.7);
    }
    .nav.is-open .nav__menu > span:not(.nav__close-icon) { opacity:0; }
    .nav.is-open .nav__close-icon { opacity:1; transform:rotate(0deg) scale(1); }
    .nav__expand {
      display:grid; grid-template-rows:0fr;
      transition:grid-template-rows .4s cubic-bezier(.4,0,.2,1);
    }
    .nav.is-open .nav__expand { padding-top:33px; grid-template-rows:1fr; }
    .nav__expand-inner { overflow:hidden; padding:0 16px; }
    .nav__links { padding:16px 0 16px; display:flex; flex-direction:column; width:50%; flex-shrink:0; }
    .nav__top-row { display:flex; align-items:flex-start; }
    @keyframes figmaCursor {
      0%   { transform:translate(4px, 2px); }
      15%  { transform:translate(22px, 18px); }
      30%  { transform:translate(38px, 8px); }
      45%  { transform:translate(28px, 34px); }
      60%  { transform:translate(8px, 44px); }
      75%  { transform:translate(44px, 30px); }
      90%  { transform:translate(16px, 12px); }
      100% { transform:translate(4px, 2px); }
    }
    .nav__vibe {
      padding:16px 0 16px; width:50%; flex-shrink:0; font-size:14px; font-weight:500;
      color:rgba(255,255,255,0.35); letter-spacing:0; line-height:1.5;
      text-align:left; position:relative;
      opacity:0; transform:translateY(8px);
      transition:opacity .2s ease, transform .25s ease;
    }
    .nav.is-open .nav__vibe {
      opacity:1; transform:translateY(0);
      transition:opacity .2s ease .22s, transform .25s ease .22s;
    }
    .nav__cursor {
      position:absolute; top:16px; left:0;
      pointer-events:none;
      animation:figmaCursor 5s ease-in-out infinite paused;
    }
    .nav.is-open .nav__cursor { animation-play-state:running; }
    .nav__cursor-tag {
      display:block;
      background:#acb0ff; color:#171717;
      font-size:10px; font-weight:700; letter-spacing:0;
      padding:2px 6px; border-radius:0 4px 4px 4px;
      white-space:nowrap; line-height:1.5;
      margin-top:-1px; margin-left:9px;
    }
    .nav__link {
      display:block;
      font-size:32px; font-weight:400; color:#fff; line-height:1.4;
      opacity:0; transform:translateY(8px);
      transition:opacity .2s ease, transform .25s ease, color .15s;
    }
    .nav.is-open .nav__link {
      opacity:1; transform:translateY(0);
      transition:opacity .2s ease .22s, transform .25s ease .22s, color .15s;
    }
    .nav__link:hover { color:rgba(255,255,255,.5); }
    .nav__link.is-current { color:rgba(255,255,255,.35); pointer-events:none; }
    .nav__divider {
      height:1px; background:rgba(255,255,255,0.12);
      margin:16px 0;
      opacity:0; transition:opacity .2s ease;
    }
    .nav.is-open .nav__divider { opacity:1; transition:opacity .2s ease .32s; }
    .nav__contact {
      padding:40px 16px 24px;
      opacity:0; transform:translateY(6px);
      transition:opacity .2s ease, transform .25s ease;
    }
    .nav.is-open .nav__contact {
      opacity:1; transform:translateY(0);
      transition:opacity .2s ease .34s, transform .25s ease .34s;
    }
    .nav__contact-label { font-size:12px; font-weight:500; color:#fff; letter-spacing:0.48px; text-transform:uppercase; }
    .nav__contact-email { display:block; font-size:16px; font-weight:500; color:#989898; margin-top:4px; }
    .nav__linkedin {
      display:inline-flex; align-items:center; justify-content:center;
      background:#acb0ff; color:#171717;
      border-radius:999px; padding:8px 10px;
      font-size:12px; font-weight:500; letter-spacing:0.48px; text-transform:uppercase;
      margin-top:40px;
      transition:opacity .2s ease;
    }
    .nav__linkedin:hover { opacity:0.8; }

    /* === CANVAS === */
    #canvas {
      position:fixed;
      top:0; left:0;
      width:100vw;
      height:100dvh;
      overflow:visible;
      cursor:grab;
      user-select:none;
      -webkit-user-select:none;
      touch-action:none;
      opacity:0;
      transition:opacity 0.8s cubic-bezier(.4,0,.2,1);
    }
    #canvas.is-revealed { opacity:1; }
    #canvas.is-dragging { cursor:grabbing; }

    /* === TILES === */
    .tile {
      position:absolute;
      top:0; left:0;
      border-radius:12px;
      overflow:hidden;
      will-change:transform;
      background:#2a2a2a;
      cursor:pointer;
      transition:opacity .15s ease;
    }
    .tile { cursor:pointer; }
    .tile:active { opacity:0.85; }
    .tile img {
      width:100%; height:100%;
      object-fit:cover;
      display:block;
      pointer-events:none;
      user-select:none;
      -webkit-user-select:none;
      -webkit-user-drag:none;
    }
    @media (min-width:640px) { .nav { top:8px; } }

    /* === LOADING SCREEN === */
    .loading-screen {
      position:fixed; inset:0; z-index:9999;
      background:#171717;
      display:flex; align-items:center; justify-content:center;
      opacity:0; pointer-events:none;
      transition:opacity 0.5s cubic-bezier(.4,0,.2,1);
    }
    .loading-screen.is-visible { opacity:1; pointer-events:auto; }
    .loading-label {
      font-family:'HW Left Bold', sans-serif;
      font-size:13px; font-weight:bold; letter-spacing:0.02em;
      background:linear-gradient(90deg,rgba(255,255,255,0.25) 0%,rgba(255,255,255,0.25) 35%,rgba(255,255,255,0.95) 50%,rgba(255,255,255,0.25) 65%,rgba(255,255,255,0.25) 100%);
      background-size:300% 100%;
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
      animation:shimmerText 1.6s linear infinite;
    }
    @keyframes shimmerText { 0%{background-position:150% 0} 100%{background-position:-150% 0} }

    /* === LIGHTBOX === */
    .arch-lightbox {
      position:fixed; inset:0; z-index:500;
      background:transparent;
      display:flex; align-items:center; justify-content:center;
      pointer-events:none;
      transition:background 0.35s cubic-bezier(0.4,0,0.2,1);
      cursor:pointer;
    }
    .arch-lightbox.is-open {
      background:rgba(0,0,0,0.72);
      pointer-events:auto;
    }
    .arch-lightbox__img {
      max-height:90vh; max-width:90vw; width:auto; height:auto;
      border-radius:12px; object-fit:contain; display:block;
      transform:scale(0.88) translateY(20px); opacity:0;
      transition:transform 0.45s cubic-bezier(0.34,1.56,0.64,1), opacity 0.28s ease;
      pointer-events:none;
    }
    .arch-lightbox.is-open .arch-lightbox__img {
      transform:scale(1) translateY(0); opacity:1;
    }
  </style>
</head>
<body>

  <!-- LOADING SCREEN -->
  <div id="loadingScreen" class="loading-screen" aria-hidden="true">
    <span class="loading-label">Loading</span>
  </div>
  <script>
  (function() {
    var screen = document.getElementById('loadingScreen');
    screen.classList.add('is-visible');
    function hide() {
      screen.style.opacity = '0';
      screen.style.pointerEvents = 'none';
      setTimeout(function() { if (screen.parentNode) screen.parentNode.removeChild(screen); }, 600);
    }
    window.__loaderDone = function() { setTimeout(hide, 300); };
  })();
  </script>

  <!-- NAV -->
  <nav class="nav" id="mainNav">
    <div class="nav__bar">
      <a href="index.html" class="nav__logo">Jana Gramlich</a>
      <div class="nav__menu" aria-hidden="true"><span></span><span></span><span></span><span class="nav__close-icon"><svg width="7" height="7" viewBox="0 0 7 7" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" xmlns="http://www.w3.org/2000/svg"><line x1="1" y1="1" x2="6" y2="6"/><line x1="6" y1="1" x2="1" y2="6"/></svg></span></div>

  <!-- INFINITE CANVAS -->
  <div id="canvas"></div>
  <div class="arch-lightbox" id="archLightbox">
    <img class="arch-lightbox__img" id="archLightboxImg" src="" alt="">
  </div>

  <script>
    // === NAV ===
    const nav = document.getElementById('mainNav');
    nav.addEventListener('mouseenter', () => nav.classList.add('is-open'));
    let _mlSuppress = false;
    nav.addEventListener('mouseleave', () => { if (!_mlSuppress) nav.classList.remove('is-open'); });
    nav.addEventListener('touchend', () => { _mlSuppress = true; setTimeout(() => { _mlSuppress = false; }, 600); }, { passive: true });
    nav.querySelector('.nav__logo').addEventListener('touchend', e => {
      if (!nav.classList.contains('is-open')) { e.preventDefault(); nav.classList.add('is-open'); }
    });
    nav.querySelector('.nav__logo').addEventListener('click', e => {
      if (!nav.classList.contains('is-open')) { e.preventDefault(); nav.classList.add('is-open'); }
    });
    nav.querySelector('.nav__menu').addEventListener('click', e => {
      e.stopPropagation();
      nav.classList.toggle('is-open');
    });
    nav.addEventListener('click', e => {
      if (e.pointerType !== 'touch') return;
      const onBar = e.target.closest('.nav__bar');
      const isOpen = nav.classList.contains('is-open');
      if (onBar && !isOpen) { e.preventDefault(); nav.classList.add('is-open'); }
      else if (onBar && !e.target.closest('a')) nav.classList.remove('is-open');
    });
    document.addEventListener('click', e => {
      if (e.pointerType === 'touch' && !e.target.closest('#mainNav')) nav.classList.remove('is-open');
    });

    // Collapsed pill state — no page scroll on archive, always show pill
    (function() {
      const navBar  = nav.querySelector('.nav__bar');
      const navMenu = nav.querySelector('.nav__menu');
      const dots    = [...nav.querySelectorAll('.nav__menu span:not(.nav__close-icon)')];
      const logoEl  = navBar.querySelector('.nav__logo');

      function setPillState() {
        const targetW = logoEl.offsetWidth + 48;
        nav.style.width           = targetW + 'px';
        nav.style.top             = window.innerWidth >= 640 ? '8px' : '4px';
        nav.style.borderRadius    = '24px';
        nav.style.background      = 'rgba(255,255,255,0.05)';
        nav.style.setProperty('--nav-bg-opacity','0.65');
        nav.style.backdropFilter       = 'blur(20px) saturate(180%)';
        nav.style.webkitBackdropFilter = 'blur(20px) saturate(180%)';
        nav.style.setProperty('--pill-w', targetW + 'px');
        navBar.style.paddingLeft  = '16px';
        navBar.style.paddingRight = '16px';
        navBar.style.paddingTop   = '0';
        navBar.style.paddingBottom= '0';
        dots[0].style.opacity     = '0';
        dots[2].style.opacity     = '0';
        dots[0].style.transform   = 'translateX(6px)';
        dots[2].style.transform   = 'translateX(-6px)';
        dots[1].style.background  = 'rgb(172,176,255)';
        dots[1].style.width       = '8px';
        dots[1].style.height      = '8px';
        navMenu.style.width       = '8px';
      }

      const EASE      = 'cubic-bezier(.4,0,.2,1)';
      const NAV_TRANS = `width .4s ${EASE}, top .4s ${EASE}, border-radius .4s ${EASE}, background .4s ${EASE}, backdrop-filter .4s ${EASE}, -webkit-backdrop-filter .4s ${EASE}`;

      new MutationObserver(() => {
        nav.style.transition = NAV_TRANS;
        void nav.offsetHeight;
        if (nav.classList.contains('is-open')) {
          nav.style.width = ''; nav.style.top = ''; nav.style.borderRadius = '';
          nav.style.background = ''; nav.style.backdropFilter = ''; nav.style.webkitBackdropFilter = '';
          navBar.style.paddingLeft = ''; navBar.style.paddingRight = '';
          navBar.style.paddingTop  = ''; navBar.style.paddingBottom = '';
          dots.forEach(d => { d.style.opacity=''; d.style.transform=''; d.style.background=''; d.style.width=''; d.style.height=''; });
          navMenu.style.width = '8px';
        } else {
          setPillState();
        }
        setTimeout(() => { nav.style.transition = ''; }, 450);
      }).observe(nav, { attributes:true, attributeFilter:['class'] });

      window.addEventListener('resize', setPillState);
      setPillState();
    })();

    // === CANVAS ===
    const canvas = document.getElementById('canvas');

    // Force canvas to full physical screen height so tiles render behind browser bar.
    const CW = screen.width  || window.innerWidth;
    const CH = screen.height || window.innerHeight;
    canvas.style.width  = CW + 'px';
    canvas.style.height = CH + 'px';

    // Grid config — portrait tiles (9:19 ratio)
    const COLS   = 8;
    const ROWS   = 5;
    const BASE_W = 120;
    const BASE_G = 12;
    const mult   = CW < 640 ? 3.2 : CW < 1024 ? 1.8 : 1.1;
    const scale  = CW / (COLS * (BASE_W + BASE_G)) * mult;
    const TILE_W = BASE_W * scale;
    const TILE_H = 253   * scale;
    const GAP    = BASE_G * scale;
    const RX     = COLS * (TILE_W + GAP);
    const RY     = ROWS * (TILE_H + GAP);

    // Only images that exist in the repo
    const AVAIL = [
      'p01','p02','p03','p04','p05','p06','p07',
      'p09','p10','p11','p12','p13','p14','p15','p16','p17','p18','p19',
      'p22','p23','p24','p25','p26','p27','p28','p29','p30',
      'p31','p32','p33','p34','p35','p36','p37','p38','p39','p40'
    ];
    const IMGS = AVAIL.map(n => `images/parallax/${n}.png`).sort(() => Math.random() - 0.5);

    // Parallax: 3 speed tiers — columns scroll vertically at different speeds
    const COL_PAR  = [0.87, 1.13, 0.91, 1.09, 0.89, 1.11, 0.93, 1.07];
    const COL_YOFF = [0, 0.5, 0, 0.5, 0, 0.5, 0, 0.5];

    const DEFS = [];
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        // stagger stored separately so it can be applied in screen space (unaffected by parallax)
        const stagger = COL_YOFF[c] * (TILE_H + GAP);
        DEFS.push({ x: c * (TILE_W + GAP), y: r * (TILE_H + GAP), stagger, w: TILE_W, h: TILE_H, c });
      }
    }

    // Reveal animation state
    let _revealStart = null;
    const _REVEAL_DUR = 1600;
    const _REVEAL_DIST_Y = 200;
    const _REVEAL_DIST_X = 160;
    function _easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }

    // Create tile DOM elements
    let _loadedCount = 0;
    let _revealed = false;
    const _totalTiles = DEFS.length;
    function _reveal() {
      if (_revealed) return;
      _revealed = true;
      canvas.classList.add('is-revealed');
      _revealStart = performance.now();
      window.__loaderDone?.();
    }
    function _onTileLoad() {
      _loadedCount++;
      if (_loadedCount >= _totalTiles) _reveal();
    }
    // Fallback: show canvas after 4s regardless of image load status
    setTimeout(_reveal, 4000);

    const tiles = DEFS.map((def, i) => {
      const el  = document.createElement('div');
      el.className = 'tile';
      el.style.width  = def.w + 'px';
      el.style.height = def.h + 'px';
      const img = document.createElement('img');
      img.alt = '';
      img.draggable = false;
      img.onload = img.onerror = _onTileLoad;
      img.src = IMGS[i % IMGS.length];
      // Belt-and-suspenders for browsers that don't fire onload for cached images
      if (img.complete) { img.onload = img.onerror = null; _onTileLoad(); }
      el.appendChild(img);
      canvas.appendChild(el);
      return Object.assign({}, def, { el });
    });

    // State
    let ox = 0, oy = 0;
    let vx = 0, vy = 0;
    let dragging = false;
    let lastX = 0, lastY = 0, lastT = 0;

    // Auto-drift: slow diagonal pan when idle
    const DRIFT_VX = 0.18, DRIFT_VY = 0.10;
    let isAutoDrifting = true;
    let driftResumeTimer = null;
    function pauseDrift() {
      isAutoDrifting = false;
      clearTimeout(driftResumeTimer);
      driftResumeTimer = setTimeout(() => { isAutoDrifting = true; }, 2500);
    }

    function tilePos(t) {
      const cx = CW / 2;
      const cy = CH / 2;
      const p  = COL_PAR[t.c];
      const wx = (((t.x + ox) % RX) + RX) % RX - RX / 2;
      const poy = oy * p + ox * (p - 1.0) * 0.3;
      const wy = (((t.y + poy) % RY) + RY) % RY - RY / 2;
      return { x: cx + wx - t.w / 2, y: cy + wy - t.h / 2 + t.stagger };
    }

    function render() {
      let rox = 0, roy = 0;
      if (_revealStart !== null) {
        const elapsed = Math.min((performance.now() - _revealStart) / _REVEAL_DUR, 1);
        const f = 1 - _easeOutCubic(elapsed);
        rox = f * _REVEAL_DIST_X;
        roy = f * _REVEAL_DIST_Y;
      }
      // Feed reveal offset into ox/oy so tilePos applies identical parallax as scroll
      ox += rox; oy += roy;
      tiles.forEach(t => {
        const p = tilePos(t);
        t.el.style.transform = `translate3d(${p.x}px,${p.y}px,0)`;
      });
      ox -= rox; oy -= roy;
      if (!dragging) {
        ox += vx; oy += vy;
        vx *= 0.95; vy *= 0.95;
        if (Math.abs(vx) < 0.01) vx = 0;
        if (Math.abs(vy) < 0.01) vy = 0;
        if (isAutoDrifting && Math.abs(vx) < 0.05 && Math.abs(vy) < 0.05) {
          ox += DRIFT_VX;
          oy += DRIFT_VY;
        }
      }
      requestAnimationFrame(render);
    }

    let _lastInteraction = 0;

    // Lightbox
    const lightbox  = document.getElementById('archLightbox');
    const lbImg     = document.getElementById('archLightboxImg');
    let lbOpen = false;
    function openLightbox(src) { lbImg.src = src; lightbox.classList.add('is-open'); lbOpen = true; }
    function closeLightbox() { lightbox.classList.remove('is-open'); lbOpen = false; }
    lightbox.addEventListener('click', closeLightbox);
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

    // Pointer events
    let dragDist = 0;
    canvas.addEventListener('pointerdown', e => {
      if (lbOpen) return;
      pauseDrift();
      dragging = true; dragDist = 0; _lastInteraction = performance.now();
      canvas.classList.add('is-dragging');
      lastX = e.clientX; lastY = e.clientY; lastT = performance.now();
      vx = 0; vy = 0;
    });

    canvas.addEventListener('pointermove', e => {
      if (!dragging) return;
      const dx = e.clientX - lastX;
      const dy = e.clientY - lastY;
      const dt = Math.max(performance.now() - lastT, 1);
      dragDist += Math.sqrt(dx * dx + dy * dy);
      const rawVx = dx / dt * 12, rawVy = dy / dt * 12;
      vx = rawVx * 0.6 + vx * 0.4;
      vy = rawVy * 0.6 + vy * 0.4;
      ox += dx; oy += dy;
      lastX = e.clientX; lastY = e.clientY; lastT = performance.now();
    });

    canvas.addEventListener('pointerup', e => {
      dragging = false; canvas.classList.remove('is-dragging');
      if (dragDist < 6) {
        const tileEl = document.elementFromPoint(e.clientX, e.clientY)?.closest('.tile');
        const img = tileEl && tileEl.querySelector('img');
        if (img) openLightbox(img.src);
      }
    });
    canvas.addEventListener('pointercancel', () => { dragging = false; canvas.classList.remove('is-dragging'); });

    // Wheel / trackpad — same EMA as drag so carry-over momentum feels identical
    canvas.addEventListener('wheel', e => {
      e.preventDefault();
      _lastInteraction = performance.now();
      vx = -e.deltaX * 0.6 + vx * 0.4;
      vy = -e.deltaY * 0.6 + vy * 0.4;
    }, { passive: false });

    render();
  </script>
</body>
</html>
