<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Archive — Jana Gramlich</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;1,9..40,400&display=swap" rel="stylesheet">
  <style>
    /* === RESET === */
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    html, body { width:100%; height:100%; overflow:hidden; background:#171717; }
    body { font-family:'DM Sans', sans-serif; font-optical-sizing:auto; color:#fff; }
    img { display:block; }
    a { text-decoration:none; color:inherit; }

    /* === NAV === */
    .nav {
      position:fixed; top:8px;
      left:50%; transform:translateX(-50%);
      width:200px;
      border-radius:24px;
      background:rgba(255,255,255,0.15);
      backdrop-filter:blur(20px) saturate(180%);
      -webkit-backdrop-filter:blur(20px) saturate(180%);
      overflow:hidden;
      z-index:100;
      transition:width .4s cubic-bezier(.4,0,.2,1);
    }
    .nav.is-open { width:min(calc(100vw - 16px), 560px); }
    .nav::before {
      content:'';
      position:absolute;
      width:164%; height:227%;
      left:-28%; top:-8%;
      background:url('images/nav-bg.png') center/cover no-repeat;
      opacity:1;
      transition:opacity .4s cubic-bezier(.4,0,.2,1);
      z-index:-1;
    }
    .nav.is-open::before { opacity:1; }
    .nav__bar {
      height:33px; display:flex; align-items:center; justify-content:center;
      padding:0 20px; cursor:pointer;
    }
    .nav__logo {
      font-size:14px; font-weight:500; color:#fff;
      letter-spacing:0.56px; text-transform:uppercase;
    }
    .nav__expand {
      display:grid; grid-template-rows:0fr;
      transition:grid-template-rows .4s cubic-bezier(.4,0,.2,1);
    }
    .nav.is-open .nav__expand { grid-template-rows:1fr; }
    .nav__expand-inner { overflow:hidden; }
    .nav__links { padding:32px 24px 0; display:flex; flex-direction:column; }
    .nav__link {
      display:block;
      font-size:32px; font-weight:400; color:#fff; line-height:1.4;
      opacity:0; transform:translateY(8px);
      transition:opacity .2s ease, transform .25s ease, color .15s;
    }
    .nav.is-open .nav__link {
      opacity:1; transform:translateY(0);
      transition:opacity .2s ease .22s, transform .25s ease .22s, color .15s;
    }
    .nav__link:hover { color:rgba(255,255,255,.5); }
    .nav__divider {
      height:1px; background:rgba(255,255,255,0.12);
      margin:16px 0;
      opacity:0; transition:opacity .2s ease;
    }
    .nav.is-open .nav__divider { opacity:1; transition:opacity .2s ease .32s; }
    .nav__contact {
      padding:40px 24px 24px;
      opacity:0; transform:translateY(6px);
      transition:opacity .2s ease, transform .25s ease;
    }
    .nav.is-open .nav__contact {
      opacity:1; transform:translateY(0);
      transition:opacity .2s ease .34s, transform .25s ease .34s;
    }
    .nav__contact-label { font-size:12px; font-weight:500; color:#fff; letter-spacing:0.48px; text-transform:uppercase; }
    .nav__contact-email { display:block; font-size:16px; font-weight:500; color:#6b6b6b; margin-top:4px; }
    .nav__linkedin {
      display:inline-flex; align-items:center; justify-content:center;
      background:#acb0ff; color:#171717;
      border-radius:999px; padding:8px 10px;
      font-size:12px; font-weight:500; letter-spacing:0.48px; text-transform:uppercase;
      margin-top:40px;
    }

    /* === CANVAS === */
    #canvas {
      position:fixed; top:0; left:0;
      width:100vw; height:100vh;
      cursor:grab;
      user-select:none;
      -webkit-user-select:none;
      touch-action:none;
    }
    #canvas.is-dragging { cursor:grabbing; }

    /* === TILES === */
    .tile {
      position:absolute;
      top:0; left:0;
      border-radius:12px;
      overflow:hidden;
      will-change:transform;
      background:#2a2a2a;
    }
    .tile img {
      width:100%; height:100%;
      object-fit:cover;
      display:block;
      pointer-events:none;
      user-select:none;
      -webkit-user-select:none;
      -webkit-user-drag:none;
    }

    @media (min-width:640px) { .nav.is-open { width:min(calc(100vw - 16px), 680px); } }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav class="nav" id="mainNav">
    <div class="nav__bar">
      <a href="index.html" class="nav__logo">Jana Gramlich</a>
    </div>
    <div class="nav__expand">
      <div class="nav__expand-inner">
        <div class="nav__links">
          <a href="index.html#work" class="nav__link">Work</a>
          <a href="index.html#about" class="nav__link">About</a>
          <a href="archive.html" class="nav__link">Archive</a>
        </div>
        <div class="nav__contact">
          <p class="nav__contact-label">Contact</p>
          <a href="mailto:hello@janagramlich.com" class="nav__contact-email">hello@janagramlich.com</a>
          <a href="https://www.linkedin.com/in/jana-gramlich-4646991a2/" class="nav__linkedin" target="_blank" rel="noopener">LinkedIn</a>
        </div>
      </div>
    </div>
  </nav>

  <!-- INFINITE CANVAS -->
  <div id="canvas"></div>

  <script>
    // === NAV ===
    const nav = document.getElementById('mainNav');
    nav.addEventListener('mouseenter', () => nav.classList.add('is-open'));
    nav.addEventListener('mouseleave', () => nav.classList.remove('is-open'));
    nav.addEventListener('click', e => {
      if (e.pointerType === 'touch' && !e.target.closest('a')) nav.classList.toggle('is-open');
    });

    // === CANVAS ===
    const canvas = document.getElementById('canvas');

    // Grid config — portrait tiles (9:19 ratio)
    const TILE_W = 120;
    const TILE_H = 253;
    const GAP    = 12;
    const COLS   = 6;
    const ROWS   = 5;
    const RX     = COLS * (TILE_W + GAP);
    const RY     = ROWS * (TILE_H + GAP);

    // 30 unique images — app screenshots + all project assets (no repeats)
    const WP = 'https://janagramlich.com/wp-content/uploads/';
    const IMGS = [
      // App screenshots (local)
      'images/archive-1.png',
      'images/archive-2.png',
      'images/archive-3.jpg',
      'images/archive-4.png',
      'images/archive-5.png',
      // Project hero images
      WP+'Dgls-hybrid-Header-1.jpg',
      WP+'About-Header-1.jpg',
      WP+'Dgls-hybrid-Header.jpg',
      WP+'Bildschirmfoto-2025-08-27-um-16.53.19.png',
      WP+'Header2.jpg',
      WP+'Header-the-makery.jpg',
      // Douglas Premium detail
      WP+'premium2.jpg',
      WP+'premium3-1.jpg',
      WP+'premium4.jpg',
      WP+'premium5.jpg',
      WP+'premium6.jpg',
      // About You detail
      WP+'AY1.jpg',
      WP+'AY2.jpg',
      WP+'AY3.jpg',
      WP+'AY4.jpg',
      // Douglas Hybrid detail
      WP+'Dgls-hybrid-1.jpg',
      WP+'Dgls-hybrid-2.jpg',
      WP+'Dgls-hybrid-3.jpg',
      // Zalando
      WP+'Z2.jpg',
      WP+'Z3.jpg',
      // DMEXCO
      WP+'1.jpg',
      WP+'2-scaled.jpg',
      WP+'3-2.jpg',
      // The Makery
      WP+'The-Makery_1.jpg',
      WP+'The-Makery_2.jpg',
    ];

    // Parallax: 3 speed tiers — columns scroll vertically at different speeds
    const COL_PAR = [0.78, 1.0, 1.22, 0.78, 1.0, 1.22]; // vertical parallax per column

    // Generate grid positions (store column index for parallax)
    const DEFS = [];
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        DEFS.push({ x: c * (TILE_W + GAP), y: r * (TILE_H + GAP), w: TILE_W, h: TILE_H, c });
      }
    }

    // Create tile DOM elements
    const tiles = DEFS.map((def, i) => {
      const el = document.createElement('div');
      el.className = 'tile';
      el.style.width  = def.w + 'px';
      el.style.height = def.h + 'px';
      const img = document.createElement('img');
      img.src = IMGS[i % IMGS.length];
      img.alt = '';
      img.draggable = false;
      el.appendChild(img);
      canvas.appendChild(el);
      return Object.assign({}, def, { el });
    });

    // State
    let ox = 0, oy = 0;       // world offset
    let vx = 0, vy = 0;       // velocity
    let dragging = false;
    let lastX = 0, lastY = 0, lastT = 0;

    // Compute screen position:
    // - X moves uniformly (no horizontal parallax)
    // - Y: vertical scroll at per-column speed + horizontal scroll bleeds into vertical drift
    function tilePos(t) {
      const cx = window.innerWidth  / 2;
      const cy = window.innerHeight / 2;
      const p  = COL_PAR[t.c];                  // 0.78 | 1.0 | 1.22
      const wx = (((t.x + ox) % RX) + RX) % RX - RX / 2;
      const poy = oy * p + ox * (p - 1.0);      // vertical parallax + cross-axis drift from horizontal
      const wy = (((t.y + poy) % RY) + RY) % RY - RY / 2;
      return { x: cx + wx - t.w / 2, y: cy + wy - t.h / 2 };
    }

    // Render loop
    function render() {
      tiles.forEach(t => {
        const p = tilePos(t);
        t.el.style.transform = `translate3d(${p.x}px,${p.y}px,0)`;
      });
      if (!dragging) {
        ox += vx; oy += vy;
        vx *= 0.94; vy *= 0.94;
        if (Math.abs(vx) < 0.05) vx = 0;
        if (Math.abs(vy) < 0.05) vy = 0;
      }
      requestAnimationFrame(render);
    }

    // Pointer events
    canvas.addEventListener('pointerdown', e => {
      dragging = true;
      canvas.classList.add('is-dragging');
      lastX = e.clientX; lastY = e.clientY; lastT = performance.now();
      vx = 0; vy = 0;
      canvas.setPointerCapture(e.pointerId);
    });

    canvas.addEventListener('pointermove', e => {
      if (!dragging) return;
      const dx = e.clientX - lastX;
      const dy = e.clientY - lastY;
      const dt = Math.max(performance.now() - lastT, 1);
      vx = dx / dt * 16;
      vy = dy / dt * 16;
      ox += dx; oy += dy;
      lastX = e.clientX; lastY = e.clientY; lastT = performance.now();
    });

    canvas.addEventListener('pointerup',     () => { dragging = false; canvas.classList.remove('is-dragging'); });
    canvas.addEventListener('pointercancel', () => { dragging = false; canvas.classList.remove('is-dragging'); });

    // Wheel / trackpad scroll
    canvas.addEventListener('wheel', e => {
      e.preventDefault();
      ox -= e.deltaX;
      oy -= e.deltaY;
      vx = 0; vy = 0;
    }, { passive: false });

    render();
  </script>
</body>
</html>
