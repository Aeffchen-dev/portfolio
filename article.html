<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Article — Jana Gramlich</title>
  <meta name="description" content="">
  <link rel="icon" href="https://cms.janagramlich.com/favicon.ico" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300;1,9..40,400&display=swap" rel="stylesheet">
  <style>
    /* === RESET === */
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    html { -webkit-font-smoothing:antialiased; }
    body {
      font-family:'DM Sans', sans-serif;
      font-optical-sizing:auto;
      background:#fafafa;
      color:#111;
      overflow-x:hidden;
    }
    img { display:block; }
    button { cursor:pointer; border:none; background:none; font-family:inherit; }
    a { text-decoration:none; color:inherit; }

    /* === NAV (dark pill, same as articles.html) === */
    .nav {
      position:fixed; top:8px;
      left:50%; transform:translateX(-50%);
      width:calc(100vw - 16px);
      border-radius:0;
      background:transparent;
      backdrop-filter:none; -webkit-backdrop-filter:none;
      overflow:hidden; z-index:100;
    }
    .nav.is-open { width:min(calc(100vw - 16px),400px); border-radius:24px; backdrop-filter:blur(20px) saturate(180%); -webkit-backdrop-filter:blur(20px) saturate(180%); }
    @media (min-width:640px) and (max-width:1023px) { .nav.is-open { width:calc(100vw - 16px); } }
    .nav::before {
      content:''; position:absolute;
      width:164%; height:227%; left:-28%; top:-8%;
      background:url('images/nav-bg.png') center/cover no-repeat;
      opacity:var(--nav-bg-opacity,0); z-index:-1;
    }
    .nav.is-open::before { transition:opacity .4s cubic-bezier(.4,0,.2,1); opacity:0.65; }
    .nav__bar {
      height:33px; display:flex; align-items:center;
      padding:0 16px; cursor:pointer; width:100%;
    }
    .nav.is-open .nav__bar {
      padding-left:calc((100% - var(--pill-w,168px)) / 2 + 16px);
      padding-right:calc((100% - var(--pill-w,168px)) / 2 + 16px);
    }
    .nav__logo { font-size:12px; font-weight:500; line-height:1; color:#fff; letter-spacing:0.56px; text-transform:uppercase; white-space:nowrap; }
    .nav__menu { display:flex; flex-direction:row; align-items:center; gap:3px; width:15px; height:13px; flex-shrink:0; position:relative; margin-left:auto; overflow:visible; transition:transform .2s cubic-bezier(.4,0,.2,1); }
    .nav__menu:hover { transform:scale(1.15); }
    .nav__menu > span:not(.nav__close-icon) { display:block; width:3px; height:3px; border-radius:50%; background:#fff; flex-shrink:0; transition:opacity .25s ease; }
    .nav__close-icon { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; opacity:0; transition:opacity .25s ease, transform .25s cubic-bezier(.4,0,.2,1); color:#fff; transform:rotate(-45deg) scale(0.7); }
    .nav.is-open .nav__menu > span:not(.nav__close-icon) { opacity:0; }
    .nav.is-open .nav__close-icon { opacity:1; transform:rotate(0deg) scale(1); }
    .nav__expand { display:grid; grid-template-rows:0fr; transition:grid-template-rows .4s cubic-bezier(.4,0,.2,1); }
    .nav.is-open .nav__expand { padding-top:33px; grid-template-rows:1fr; }
    .nav__expand-inner { overflow:hidden; }
    .nav__links { padding:32px 16px 0; display:flex; flex-direction:column; }
    .nav__link { display:block; font-size:32px; font-weight:400; color:#fff; line-height:1.4; opacity:0; transform:translateY(8px); transition:opacity .2s ease, transform .25s ease, color .15s; }
    .nav.is-open .nav__link { opacity:1; transform:translateY(0); transition:opacity .2s ease .22s, transform .25s ease .22s, color .15s; }
    .nav__link:hover { color:rgba(255,255,255,.5); }
    .nav__divider { height:1px; background:rgba(255,255,255,0.12); margin:16px 0; opacity:0; transition:opacity .2s ease; }
    .nav.is-open .nav__divider { opacity:1; transition:opacity .2s ease .32s; }
    .nav__contact { padding:40px 16px 24px; opacity:0; transform:translateY(6px); transition:opacity .2s ease, transform .25s ease; }
    .nav.is-open .nav__contact { opacity:1; transform:translateY(0); transition:opacity .2s ease .34s, transform .25s ease .34s; }
    .nav__contact-label { font-size:12px; font-weight:500; color:#fff; letter-spacing:0.48px; text-transform:uppercase; }
    .nav__contact-email { display:block; font-size:16px; font-weight:500; color:#989898; margin-top:4px; }
    .nav__linkedin { display:inline-flex; align-items:center; justify-content:center; background:#acb0ff; color:#171717; border-radius:999px; padding:8px 10px; font-size:12px; font-weight:500; letter-spacing:0.48px; text-transform:uppercase; margin-top:40px; }

    /* === PAGE WRAPPER === */
    .page-wrapper { background:#fafafa; min-height:100dvh; }

    /* === LOADING / ERROR === */
    .article-loading {
      display:flex; align-items:center; justify-content:center;
      min-height:80dvh; font-size:14px; color:#999; text-align:center;
    }

    /* === ARTICLE WRAP === */
    .article-wrap { display:none; }
    .article-wrap.is-loaded { display:block; }

    /* === HEADER (always at top, nav clearance) === */
    .article-header {
      padding:max(72px,10dvh) 24px 0;
      max-width:860px; margin:0 auto;
    }

    /* === HERO (below header, full-bleed) === */
    .article-hero {
      width:100%; margin-top:40px;
      max-height:560px; overflow:hidden;
    }
    .article-hero img { width:100%; height:100%; object-fit:cover; display:block; }

    /* === TITLE === */
    .article-title {
      font-size:clamp(36px,6vw,88px);
      font-weight:500; line-height:1.0;
      letter-spacing:-0.03em; color:#111;
    }

    /* === META === */
    .article-meta { display:flex; align-items:center; gap:10px; margin-bottom:20px; }
    .article-category {
      font-size:10px; font-weight:500; color:#111;
      letter-spacing:0.8px; text-transform:uppercase;
      border:1px solid rgba(0,0,0,0.15); border-radius:999px; padding:4px 10px;
    }
    .article-meta-sep { width:4px; height:4px; border-radius:50%; background:rgba(0,0,0,0.2); flex-shrink:0; }
    .article-date { font-size:11px; font-weight:400; color:#666; }

    /* === EXCERPT === */
    .article-excerpt {
      margin-top:20px;
      font-size:clamp(16px,1.6vw,20px);
      font-weight:300; line-height:1.6; color:#444; max-width:640px;
    }

    /* === DIVIDER === */
    .article-divider { height:1px; background:rgba(0,0,0,0.08); max-width:860px; margin:40px auto; }

    /* === BODY === */
    .article-body { padding:0 24px 80px; max-width:680px; margin:0 auto; }
    .article-body p { font-size:17px; font-weight:400; line-height:1.75; color:#222; margin-bottom:28px; }
    .article-body h2 {
      font-size:clamp(28px,4.5vw,52px);
      font-weight:500; letter-spacing:-0.025em; line-height:1.1;
      color:#111; margin:64px 0 20px;
    }
    .article-body h3 {
      font-size:clamp(22px,3vw,36px);
      font-weight:500; line-height:1.2; color:#111; margin:48px 0 14px;
    }
    .article-body h4 {
      font-size:13px; font-weight:500; color:#111;
      text-transform:uppercase; letter-spacing:0.08em; margin:36px 0 8px;
    }
    .article-body img { width:calc(100% + 48px); margin-left:-24px; display:block; margin-top:8px; margin-bottom:8px; }
    .article-body figure { margin:48px 0; }
    .article-body figure img { width:calc(100% + 48px); margin-left:-24px; margin-top:0; margin-bottom:0; }
    .article-body figcaption { font-size:12px; color:#999; margin-top:10px; font-style:italic; }
    .article-body blockquote { margin:56px 0; padding-left:24px; border-left:2px solid #111; }
    .article-body blockquote p { font-size:clamp(20px,2.8vw,28px); font-weight:400; line-height:1.4; color:#111; font-style:italic; margin-bottom:0; }
    .article-body blockquote cite { display:block; margin-top:16px; font-size:12px; font-weight:500; color:#666; letter-spacing:0.06em; text-transform:uppercase; font-style:normal; }
    .article-body ul, .article-body ol { padding-left:24px; margin-bottom:28px; }
    .article-body li { font-size:17px; line-height:1.75; color:#222; margin-bottom:6px; }
    .article-body a { color:#111; border-bottom:1px solid rgba(0,0,0,.25); transition:border-color .15s; }
    .article-body a:hover { border-color:#111; }
    .article-body hr { border:none; height:1px; background:rgba(0,0,0,.1); margin:56px 0; }
    .article-body .wp-block-image img { width:calc(100% + 48px); margin-left:-24px; margin-bottom:0; }
    .article-body .wp-block-image figcaption { font-size:12px; color:#999; font-style:italic; padding-top:8px; }
    .article-body .wp-block-quote { margin:56px 0; padding-left:24px; border-left:2px solid #111; }
    .article-body .wp-block-quote p { font-size:clamp(20px,2.8vw,28px); font-weight:400; line-height:1.4; color:#111; font-style:italic; margin-bottom:0; }
    .article-body .wp-block-separator { border:none; height:1px; background:rgba(0,0,0,.1); margin:56px 0; }

    /* === FOOTER === */
    .article-footer {
      padding:32px 24px 48px; max-width:680px; margin:0 auto;
      border-top:1px solid rgba(0,0,0,0.08);
      display:flex; align-items:center; justify-content:space-between;
    }
    .article-footer__back { display:inline-flex; align-items:center; gap:8px; font-size:11px; font-weight:500; color:#111; letter-spacing:0.48px; text-transform:uppercase; transition:opacity .3s; }
    .article-footer__back:hover { opacity:0.5; }
    .article-footer__nav { display:flex; gap:24px; }
    .article-footer__nav a { font-size:11px; font-weight:500; color:#999; letter-spacing:0.48px; text-transform:uppercase; transition:color .15s; }
    .article-footer__nav a:hover { color:#111; }

    /* === RESPONSIVE === */
    @media (min-width:640px) {
      .article-hero { max-height:600px; }
      .article-header { padding-left:40px; padding-right:40px; }
    }
    @media (min-width:1024px) {
      .article-hero { max-height:680px; }
      .article-header { max-width:1000px; padding-left:60px; padding-right:60px; }
      .article-body { max-width:740px; padding:0 60px 100px; }
      .article-divider { max-width:1000px; }
      .article-body img,
      .article-body figure img,
      .article-body .wp-block-image img { width:calc(100% + 120px); margin-left:-60px; }
    }
  </style>
</head>
<body>

<div class="page-wrapper">

  <!-- NAV -->
  <nav class="nav" id="mainNav">
    <div class="nav__bar">
      <a href="index.html" class="nav__logo">Jana Gramlich</a>
      <div class="nav__menu" aria-hidden="true"><span></span><span></span><span></span><span class="nav__close-icon"><svg width="7" height="7" viewBox="0 0 7 7" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" xmlns="http://www.w3.org/2000/svg"><line x1="1" y1="1" x2="6" y2="6"/><line x1="6" y1="1" x2="1" y2="6"/></svg></span></div>
    </div>
    <div class="nav__expand">
      <div class="nav__expand-inner">

  <!-- LOADING STATE -->

  <!-- ARTICLE (shown after load) -->
  <div class="article-wrap" id="articleWrap">

    <!-- Header: meta + title always at top -->
    <header class="article-header" id="articleHeader">

        All Articles
      </a>
      <nav class="article-footer__nav">
        <a href="privacy-policy.html">Privacy</a>
        <a href="imprint.html">Imprint</a>
      </nav>
    </footer>

  </div>

</div><!-- /.page-wrapper -->

<script>
  // === NAV ===
  const nav = document.getElementById('mainNav');
  nav.addEventListener('mouseenter', () => nav.classList.add('is-open'));
  let _mlSuppress = false;
  nav.addEventListener('mouseleave', () => { if (!_mlSuppress) nav.classList.remove('is-open'); });
  nav.addEventListener('touchend', () => { _mlSuppress = true; setTimeout(() => { _mlSuppress = false; }, 600); }, { passive:true });
  nav.querySelector('.nav__logo').addEventListener('touchend', e => {
    if (!nav.classList.contains('is-open')) { e.preventDefault(); nav.classList.add('is-open'); }
  });
  nav.querySelector('.nav__logo').addEventListener('click', e => {
    if (!nav.classList.contains('is-open')) { e.preventDefault(); nav.classList.add('is-open'); }
  });
  nav.querySelector('.nav__menu').addEventListener('click', e => {
    e.stopPropagation(); nav.classList.toggle('is-open');
  });
  nav.addEventListener('click', e => {
    if (e.pointerType !== 'touch') return;
    const onBar = e.target.closest('.nav__bar');
    const isOpen = nav.classList.contains('is-open');
    if (onBar && !isOpen) { e.preventDefault(); nav.classList.add('is-open'); }
    else if (onBar && !e.target.closest('a')) nav.classList.remove('is-open');
  });
  document.addEventListener('click', e => {
    if (e.pointerType === 'touch' && !e.target.closest('#mainNav')) nav.classList.remove('is-open');
  });

  (function() {
    const navBar  = nav.querySelector('.nav__bar');
    const navMenu = nav.querySelector('.nav__menu');
    const dots    = [...nav.querySelectorAll('.nav__menu span:not(.nav__close-icon)')];
    const logoEl  = navBar.querySelector('.nav__logo');

    function setPillState() {
      const targetW = logoEl.offsetWidth + 48;
      nav.style.width = targetW + 'px';
      nav.style.top   = window.innerWidth >= 640 ? '8px' : '4px';
      nav.style.borderRadius = '24px';
      nav.style.background   = 'rgba(0,0,0,0.45)';
      nav.style.setProperty('--nav-bg-opacity','0');
      nav.style.backdropFilter       = 'blur(20px) saturate(180%)';
      nav.style.webkitBackdropFilter = 'blur(20px) saturate(180%)';
      nav.style.setProperty('--pill-w', targetW + 'px');
      navBar.style.paddingLeft  = '16px'; navBar.style.paddingRight = '16px';
      navBar.style.paddingTop   = '0';   navBar.style.paddingBottom= '0';
      dots[0].style.opacity = '0'; dots[2].style.opacity = '0';
      dots[0].style.transform = 'translateX(6px)'; dots[2].style.transform = 'translateX(-6px)';
      dots[1].style.background = 'rgb(172,176,255)';
      dots[1].style.width = '8px'; dots[1].style.height = '8px';
      navMenu.style.width = '8px';
    }

    const EASE = 'cubic-bezier(.4,0,.2,1)';
    const NAV_TRANS = `width .4s ${EASE}, top .4s ${EASE}, border-radius .4s ${EASE}, background .4s ${EASE}, backdrop-filter .4s ${EASE}, -webkit-backdrop-filter .4s ${EASE}`;

    new MutationObserver(() => {
      nav.style.transition = NAV_TRANS;
      void nav.offsetHeight;
      if (nav.classList.contains('is-open')) {
        nav.style.width = ''; nav.style.top = ''; nav.style.borderRadius = '';
        nav.style.background = ''; nav.style.backdropFilter = ''; nav.style.webkitBackdropFilter = '';
        navBar.style.paddingLeft=''; navBar.style.paddingRight='';
        navBar.style.paddingTop=''; navBar.style.paddingBottom='';
        dots.forEach(d => { d.style.opacity=''; d.style.transform=''; d.style.background=''; d.style.width=''; d.style.height=''; });
        navMenu.style.width = '8px';
      } else {
        setPillState();
      }
      setTimeout(() => { nav.style.transition = ''; }, 450);
    }).observe(nav, { attributes:true, attributeFilter:['class'] });

    window.addEventListener('resize', setPillState);
    setPillState();
  })();

  // === ARTICLE FETCH ===
  const API = 'https://cms.janagramlich.com/wp-json/wp/v2';

  function stripHtml(html) {
    return new DOMParser().parseFromString(html, 'text/html').body.textContent || '';
  }

  function formatDate(iso) {
    return new Date(iso).toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' });
  }

  function showError(msg) {
    document.getElementById('articleLoading').innerHTML =
      `<div style="max-width:400px;padding:0 16px"><p style="margin-bottom:16px">${msg}</p><a href="articles.html" style="font-size:12px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:#111;border-bottom:1px solid rgba(0,0,0,.25)">← All Articles</a></div>`;
  }

  // Resolve an ACF image field to a URL.
  // acf_format=standard → object with .url; without it → integer attachment ID.
  async function resolveImgUrl(img) {
    if (!img) return '';
    if (typeof img === 'object') return img.url || img.source_url || '';
    // Integer or numeric string → attachment ID, fetch the URL
    const id = parseInt(img, 10);
    if (!id) return typeof img === 'string' ? img : '';
    try {
      const r = await fetch(`${API}/media/${id}?_fields=source_url`, { signal: AbortSignal.timeout(6000) });
      if (r.ok) return (await r.json()).source_url || '';
    } catch(e) {}
    return '';
  }

  // Render ALL flexible content rows in order.
  // layout 'editor'/'wysiwyg'/'text' → text field (HTML)
  // layout 'image'/'img'/'photo'     → image field (object or attachment ID)
  async function renderSections(sections) {
    if (!Array.isArray(sections) || sections.length === 0) return '';
    console.log('[article] renderSections:', sections.length, 'rows');
    const parts = await Promise.all(sections.map(async (s, i) => {
      console.log(`[article] row[${i}]:`, JSON.stringify(s));
      const layout = (s.acf_fc_layout || '').toLowerCase();

      if (layout === 'image' || layout === 'img' || layout === 'photo') {
        const raw = s.img || s.image || s.photo || s.src || null;
        const url = await resolveImgUrl(raw);
        if (!url) return '';
        const cap = s.caption || s.alt || '';
        return `<figure><img src="${url}" alt="${cap}" loading="lazy">${cap ? `<figcaption>${cap}</figcaption>` : ''}</figure>`;
      }

      // For editor/text layouts AND any unknown layout:
      // 1. Try known field names
      const known = s.wysiwyg || s.text || (typeof s.content === 'string' ? s.content : '') || s.html || s.body || '';
      if (known) { console.log(`[article] row[${i}] "${layout}" via known field`); return known; }
      // 2. Catch-all: scan every string-valued field in the row
      for (const [k, v] of Object.entries(s)) {
        if (k === 'acf_fc_layout') continue;
        if (typeof v === 'string' && v.trim().length > 0) {
          console.log(`[article] row[${i}] "${layout}" via field "${k}"`);
          return v;
        }
      }
      return '';
    }));
    return parts.filter(Boolean).join('\n');
  }

  const params = new URLSearchParams(window.location.search);
  const slug   = params.get('slug');
  const postId = params.get('id');

  if (!slug && !postId) {
    showError('No article specified.');
  } else {
    // acf_format=standard removed — wysiwyg always returns HTML regardless,
    // and integer image IDs are resolved via resolveImgUrl() → /media/{id}
    const FIELDS = 'id,title,date,excerpt,slug,content,acf,_links';

    function buildUrl(base) {
      return slug
        ? `${API}/${base}?slug=${encodeURIComponent(slug)}&_fields=${FIELDS}&_embed=true`
        : `${API}/${base}/${postId}?_fields=${FIELDS}&_embed=true`;
    }

    async function fetchArticle() {
      const bases = ['articles', 'article'];
      try {
        const idx = await fetch(API.replace('/wp/v2', ''), { signal: AbortSignal.timeout(5000) }).then(r => r.ok ? r.json() : null);
        if (idx?.routes) {
          const SKIP = new Set([...bases, 'posts','pages','media','types','statuses','taxonomies',
            'tags','categories','users','comments','settings','themes','plugins','blocks',
            'block-renderer','search','batch','sidebars','widgets','widget-types','menus',
            'menu-items','menu-locations','templates','template-parts','global-styles',
            'navigation','font-families','font-collections','pattern-directory',
            'block-types','block-patterns','block-pattern-categories','projects','project']);
          const others = Object.keys(idx.routes)
            .map(p => p.match(/^\/wp\/v2\/([^/?(]+)$/)?.[1])
            .filter(b => b && !SKIP.has(b));
          bases.push(...others);
        }
      } catch(e) {}
      bases.push('posts'); // final fallback

      for (const base of bases) {
        // Try acf_format=standard first (returns full image objects from ACF),
        // then without it as fallback (some WP configs reject the param).
        let post = null;
        for (const acfSuffix of ['&acf_format=standard', '']) {
          const r = await fetch(buildUrl(base) + acfSuffix, { signal: AbortSignal.timeout(10000) }).catch(() => null);
          if (!r) continue;
          if (!r.ok) {
            const body = await r.json().catch(() => ({}));
            if (body.code === 'rest_no_route') { post = null; break; } // skip this base
            console.warn(`[article] /${base}${acfSuffix}: HTTP ${r.status}`, body.code);
            continue; // try next suffix
          }
          const data = await r.json();
          const candidate = Array.isArray(data) ? data[0] : data;
          if (!candidate?.id) continue;
          const hasAcf = candidate.acf && typeof candidate.acf === 'object'
                      && Object.keys(candidate.acf).length > 0;
          console.log(`[article] /${base}${acfSuffix ? ' +std' : ''} → id=${candidate.id} hasAcf=${hasAcf}`);
          if (hasAcf) { post = candidate; break; } // got ACF data — done
          if (!post) post = candidate;              // keep as fallback
        }
        if (post?.id) { console.log('[article] using post', post); return post; }
      }
      throw new Error('Article not found');
    }

    fetchArticle()
      .then(async post => {
        const acf = post.acf || {};

        // Find flexible content: check known field 'content' first, then scan all ACF fields
        console.log('[article] ACF keys:', Object.keys(acf));
        console.log('[article] ACF data:', JSON.stringify(acf));
        const flexRows = (() => {
          const check = v => Array.isArray(v) && v.length > 0
                          && typeof v[0] === 'object' && v[0] !== null && 'acf_fc_layout' in v[0];
          if (check(acf.content)) { console.log('[article] using acf.content'); return acf.content; }
          for (const [k, v] of Object.entries(acf)) {
            if (check(v)) { console.log(`[article] using acf.${k}`); return v; }
          }
          console.log('[article] no flexible content found in ACF');
          return [];
        })();

        const title   = stripHtml(post.title?.rendered || 'Untitled');
        const content = await renderSections(flexRows);
        const excerpt  = stripHtml(post.excerpt?.rendered || '').replace(/\[&hellip;\]|\[…\]/g, '').trim();
        const date     = formatDate(post.date);
        const category = post._embedded?.['wp:term']?.[0]?.[0]?.name || '';
        const imgRow   = flexRows.find(s => ['image','img','photo'].includes((s.acf_fc_layout||'').toLowerCase()));
        const heroImg  = post._embedded?.['wp:featuredmedia']?.[0]?.source_url
                      || await resolveImgUrl(imgRow?.img || imgRow?.image)
                      || '';

        document.title = title + ' — Jana Gramlich';

        // Header: always meta + title at top
        document.getElementById('articleMeta').innerHTML = (category
          ? `<span class="article-category">${category}</span><span class="article-meta-sep"></span>` : '')
          + `<span class="article-date">${date}</span>`;
        document.getElementById('articleTitle').textContent = title;

        const excerptEl = document.getElementById('articleExcerpt');
        if (excerpt && excerpt.length > 20) excerptEl.textContent = excerpt;
        else excerptEl.style.display = 'none';

        // Hero image below header
        if (heroImg) {
          document.getElementById('articleHeroImg').src = heroImg;
          document.getElementById('articleHeroImg').alt = title;
          document.getElementById('articleHero').style.display = '';
        }

        // test2 field prepended before flexible content
        const test2 = acf.test2 ? `<p>${acf.test2}</p>` : '';
        const fullContent = test2 + content || (post.content?.rendered || '').trim();

        document.getElementById('articleBody').innerHTML = fullContent;
        document.getElementById('articleLoading').style.display = 'none';
        document.getElementById('articleWrap').classList.add('is-loaded');
        document.querySelectorAll('.article-body img').forEach(img => {
          if (!img.hasAttribute('loading')) img.setAttribute('loading', 'lazy');
        });
      })
      .catch(err => {
        console.error('[article] fetch failed:', err);
        const msg = err.name === 'TimeoutError' ? 'Request timed out.' : (err.message || 'network error');
        showError('Could not load article — ' + msg);
      });
  }
</script>
</body>
</html>
