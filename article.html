<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Article — Jana Gramlich</title>
  <meta name="description" content="">
  <link rel="icon" href="https://cms.janagramlich.com/favicon.ico" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300;1,9..40,400&display=swap" rel="stylesheet">
  <style>
    /* === RESET === */
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    html { -webkit-font-smoothing:antialiased; }
    body {
      font-family:'DM Sans', sans-serif;
      font-optical-sizing:auto;
      background:#fafafa;
      color:#111;
      overflow-x:hidden;
    }
    img { display:block; }
    button { cursor:pointer; border:none; background:none; font-family:inherit; }
    a { text-decoration:none; color:inherit; }

    /* === NAV (dark pill, same as articles.html) === */
    .nav {
      position:fixed; top:8px;
      left:50%; transform:translateX(-50%);
      width:calc(100vw - 16px);
      border-radius:0;
      background:transparent;
      backdrop-filter:none; -webkit-backdrop-filter:none;
      overflow:hidden; z-index:100;
    }
    .nav.is-open { width:min(calc(100vw - 16px),400px); border-radius:24px; backdrop-filter:blur(20px) saturate(180%); -webkit-backdrop-filter:blur(20px) saturate(180%); }
    @media (min-width:640px) and (max-width:1023px) { .nav.is-open { width:calc(100vw - 16px); } }
    .nav::before {
      content:''; position:absolute;
      width:164%; height:227%; left:-28%; top:-8%;
      background:url('images/nav-bg.png') center/cover no-repeat;
      opacity:var(--nav-bg-opacity,0); z-index:-1;
    }
    .nav.is-open::before { transition:opacity .4s cubic-bezier(.4,0,.2,1); opacity:0.65; }
    .nav__bar {
      height:33px; display:flex; align-items:center;
      padding:0 16px; cursor:pointer; width:100%;
    }
    .nav.is-open .nav__bar {
      padding-left:calc((100% - var(--pill-w,168px)) / 2 + 16px);
      padding-right:calc((100% - var(--pill-w,168px)) / 2 + 16px);
    }
    .nav__logo { font-size:12px; font-weight:500; line-height:1; color:#fff; letter-spacing:0.56px; text-transform:uppercase; white-space:nowrap; }
    .nav__menu { display:flex; flex-direction:row; align-items:center; gap:3px; width:15px; height:13px; flex-shrink:0; position:relative; margin-left:auto; overflow:visible; transition:transform .2s cubic-bezier(.4,0,.2,1); }
    .nav__menu:hover { transform:scale(1.15); }
    .nav__menu > span:not(.nav__close-icon) { display:block; width:3px; height:3px; border-radius:50%; background:#fff; flex-shrink:0; transition:opacity .25s ease; }
    .nav__close-icon { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; opacity:0; transition:opacity .25s ease, transform .25s cubic-bezier(.4,0,.2,1); color:#fff; transform:rotate(-45deg) scale(0.7); }
    .nav.is-open .nav__menu > span:not(.nav__close-icon) { opacity:0; }
    .nav.is-open .nav__close-icon { opacity:1; transform:rotate(0deg) scale(1); }
    .nav__expand { display:grid; grid-template-rows:0fr; transition:grid-template-rows .4s cubic-bezier(.4,0,.2,1); }
    .nav.is-open .nav__expand { padding-top:33px; grid-template-rows:1fr; }
    .nav__expand-inner { overflow:hidden; }
    .nav__links { padding:32px 16px 0; display:flex; flex-direction:column; }
    .nav__link { display:block; font-size:32px; font-weight:400; color:#fff; line-height:1.4; opacity:0; transform:translateY(8px); transition:opacity .2s ease, transform .25s ease, color .15s; }
    .nav.is-open .nav__link { opacity:1; transform:translateY(0); transition:opacity .2s ease .22s, transform .25s ease .22s, color .15s; }
    .nav__link:hover { color:rgba(255,255,255,.5); }
    .nav__divider { height:1px; background:rgba(255,255,255,0.12); margin:16px 0; opacity:0; transition:opacity .2s ease; }
    .nav.is-open .nav__divider { opacity:1; transition:opacity .2s ease .32s; }
    .nav__contact { padding:40px 16px 24px; opacity:0; transform:translateY(6px); transition:opacity .2s ease, transform .25s ease; }
    .nav.is-open .nav__contact { opacity:1; transform:translateY(0); transition:opacity .2s ease .34s, transform .25s ease .34s; }
    .nav__contact-label { font-size:12px; font-weight:500; color:#fff; letter-spacing:0.48px; text-transform:uppercase; }
    .nav__contact-email { display:block; font-size:16px; font-weight:500; color:#989898; margin-top:4px; }
    .nav__linkedin { display:inline-flex; align-items:center; justify-content:center; background:#acb0ff; color:#171717; border-radius:999px; padding:8px 10px; font-size:12px; font-weight:500; letter-spacing:0.48px; text-transform:uppercase; margin-top:40px; }

    /* === PAGE WRAPPER === */
    body { background:#000; color:#fff; }

    /* === LOADING === */
    .article-loading { display:flex; align-items:center; justify-content:center; min-height:100dvh; font-size:14px; color:rgba(255,255,255,.4); text-align:center; }

    /* === ARTICLE CONTENT (no modal overlay) === */
    .modal { display:none; }
    .modal.is-visible { display:block; }

    /* === ARTICLE HERO === */
    .article-hero { background:#000; }
    .hero-top {
      height:80vh;
      max-width:800px; margin:0 auto;
      padding:24px 0 28px;
      display:flex; flex-direction:column;
    }

    /* center zone: must fit within 80vh — min-height:0 allows shrinking */
    .hero-main {
      flex:1; min-height:0; overflow:hidden;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center; gap:10px;
      padding:0 32px;
    }
    .hero__title {
      font-size:clamp(28px, 5vw, 44px); font-weight:700;
      letter-spacing:0; line-height:0.9; color:#fff;
      text-align:center; text-transform:uppercase;
      max-width:8em;
    }
    .hero__subtitle {
      font-size:clamp(13px, 2vw, 16px); font-weight:400; line-height:1.4;
      color:rgba(255,255,255,.55); text-align:center; max-width:36em;
    }
    .hero__summary {
      font-size:13px; font-weight:400; line-height:1.55;
      color:rgba(255,255,255,.45); text-align:center;
      max-width:38em;
    }

    /* bottom bar: BACK left, SHARE right */
    .hero-bottom {
      display:flex; justify-content:space-between; align-items:center;
      flex-shrink:0;
    }
    .back-link {
      display:inline-flex; align-items:center; gap:7px;
      font-size:11px; font-weight:500; letter-spacing:.09em; text-transform:uppercase;
      color:#fff; transition:opacity .15s;
    }
    .back-link:hover { opacity:.6; }
    .back-link__arrow { display:inline-flex; flex-shrink:0; transform:rotate(180deg); }
    .share-btn {
      display:inline-flex; align-items:center; gap:6px;
      font-size:11px; font-weight:500; letter-spacing:.09em; text-transform:uppercase;
      color:#fff; transition:opacity .15s; cursor:pointer;
      background:none; border:none; font-family:inherit; padding:0;
    }
    .share-btn:hover { opacity:.6; }

    /* === BLOCKS === */
    .blocks { padding:72px 0; margin:0 auto; max-width:800px; }
    .blocks__grid { display:grid; grid-template-columns:repeat(4,1fr); gap:4px; }
    .block { border-radius:4px; overflow:hidden; }
    .block--full { grid-column:span 4; }
    .block--half { grid-column:span 2; }
    .block-image { background:#1A1A1A; }
    .block-image img { width:100%; height:auto; display:block; }
    .block-text { background:#141414; border-radius:4px; }
    .text-inner { padding:12px 16px; }
    .text-body { font-size:14.5px; font-weight:400; line-height:1.65; color:rgba(255,255,255,.55); }
    .text-body p { margin-bottom:20px; }
    .text-body p:last-child { margin-bottom:0; }
    .text-body h2 { font-size:clamp(18px,2.5vw,26px); font-weight:500; color:#fff; letter-spacing:-0.02em; margin:28px 0 10px; }
    .text-body h3 { font-size:clamp(15px,1.8vw,20px); font-weight:500; color:#fff; margin:20px 0 8px; }
    .text-body a { color:rgba(255,255,255,.55); border-bottom:1px solid rgba(255,255,255,.2); }

    /* === ARTICLE PAGE END (Next Up) === */
    .article-page-end { margin:72px 10vw 0; padding:0; }
    .article-page-end .page-links {
      display:flex; justify-content:space-between; align-items:center;
      padding:12px 0; gap:8px;
    }
    .article-page-end .page-links__label,
    .article-page-end .page-links__all {
      font-size:11px; font-weight:500; letter-spacing:0.48px;
      text-transform:uppercase; color:rgba(255,255,255,0.6);
      display:inline-flex; align-items:center; gap:5px;
      transition:opacity .15s; text-decoration:none;
      background:none; border:none; font-family:inherit; padding:0; cursor:pointer;
    }
    .article-page-end .page-links__label:hover,
    .article-page-end .page-links__all:hover { opacity:.5; }
    .article-page-end .page-links__client {
      margin-left:16px; font-weight:400; color:rgba(255,255,255,0.6);
      text-transform:none; letter-spacing:0;
    }
    .article-next-reveal {
      position:relative; overflow:hidden; cursor:pointer;
      background:#1a1a1a; border-radius:4px;
    }
    .article-next-reveal__bg { display:block; }
    .article-next-reveal__bg img, .article-next-reveal__bg video {
      width:100%; height:auto; display:block;
    }
    .article-next-reveal__inner {
      position:absolute; inset:0; z-index:1;
      display:flex; flex-direction:column; justify-content:center; align-items:center;
      padding:20px; text-align:center;
    }
    .article-next-reveal__title { font-size:14px; font-weight:400; letter-spacing:0; line-height:1.3; color:#fff; }
    @media (min-width:640px) {
      .article-next-reveal { border-radius:4px 4px 0 0; }
      .article-next-reveal__inner { display:none; }
      .article-page-end .page-links__client { display:inline; }
    }

    /* === RESPONSIVE === */
    @media (max-width:639px) {
      .hero-top { height:80dvh; padding:20px 0; }
      .hero-main { padding:0 20px; }
      .blocks { padding:72px 0; }
      .blocks__grid { grid-template-columns:1fr; }
      .block--full, .block--half { grid-column:span 1; }
      .article-page-end .page-links__client { display:none; }
    }
    @media (min-width:640px) and (max-width:1023px) {
      .hero-top { padding:24px 0 28px; }
      .hero-main { padding:0 24px; }
    }
  </style>
</head>

<div class="page-wrapper">

  <!-- NAV -->
  <nav class="nav" id="mainNav">
    <div class="nav__bar">
      <a href="index.html" class="nav__logo">Jana Gramlich</a>
      <div class="nav__menu" aria-hidden="true"><span></span><span></span><span></span><span class="nav__close-icon"><svg width="7" height="7" viewBox="0 0 7 7" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" xmlns="http://www.w3.org/2000/svg"><line x1="1" y1="1" x2="6" y2="6"/><line x1="6" y1="1" x2="1" y2="6"/></svg></span></div>

<script>
  // === NAV ===
  const nav = document.getElementById('mainNav');
  let _mlSuppress = false, _openedByHover = false, _hoverAllowAfter = 0;
  function closeByHover() {
    _openedByHover = false;
    _hoverAllowAfter = Date.now() + 600;
    nav.classList.remove('is-open');
  }
  nav.addEventListener('mouseenter', () => {
    if (window.innerWidth < 640) return;
    if (Date.now() < _hoverAllowAfter) return;
    _openedByHover = true;
    nav.classList.add('is-open');
  });
  nav.addEventListener('mouseleave', () => {
    if (window.innerWidth >= 640 && !_mlSuppress && _openedByHover) closeByHover();
  });
  nav.addEventListener('touchend', () => { _mlSuppress = true; setTimeout(() => { _mlSuppress = false; }, 600); }, { passive:true });
  nav.querySelector('.nav__logo').addEventListener('touchend', e => {
    if (!nav.classList.contains('is-open')) { e.preventDefault(); nav.classList.add('is-open'); }
  });
  nav.querySelector('.nav__logo').addEventListener('click', e => {
    if (!nav.classList.contains('is-open')) { e.preventDefault(); nav.classList.add('is-open'); }
  });
  nav.querySelector('.nav__menu').addEventListener('click', e => {
    e.stopPropagation(); nav.classList.toggle('is-open');
  });
  nav.addEventListener('click', e => {
    if (e.pointerType !== 'touch') return;
    const onBar = e.target.closest('.nav__bar');
    const isOpen = nav.classList.contains('is-open');
    if (onBar && !isOpen) { e.preventDefault(); nav.classList.add('is-open'); }
    else if (onBar && !e.target.closest('a')) nav.classList.remove('is-open');
  });
  document.addEventListener('click', e => {
    if (e.pointerType === 'touch' && !e.target.closest('#mainNav')) nav.classList.remove('is-open');
  });

  (function() {
    const navBar  = nav.querySelector('.nav__bar');
    const navMenu = nav.querySelector('.nav__menu');
    const dots    = [...nav.querySelectorAll('.nav__menu span:not(.nav__close-icon)')];
    const logoEl  = navBar.querySelector('.nav__logo');

    function setPillState() {
      const targetW = logoEl.offsetWidth + 48;
      nav.style.width = targetW + 'px';
      nav.style.top   = window.innerWidth >= 640 ? '8px' : '4px';
      nav.style.borderRadius = '24px';
      nav.style.background   = 'rgba(0,0,0,0.45)';
      nav.style.setProperty('--nav-bg-opacity','0');
      nav.style.backdropFilter       = 'blur(20px) saturate(180%)';
      nav.style.webkitBackdropFilter = 'blur(20px) saturate(180%)';
      nav.style.setProperty('--pill-w', targetW + 'px');
      navBar.style.paddingLeft  = '16px'; navBar.style.paddingRight = '16px';
      navBar.style.paddingTop   = '0';   navBar.style.paddingBottom= '0';
      dots[0].style.opacity = '0'; dots[2].style.opacity = '0';
      dots[0].style.transform = 'translateX(6px)'; dots[2].style.transform = 'translateX(-6px)';
      dots[1].style.background = 'rgb(172,176,255)';
      dots[1].style.width = '8px'; dots[1].style.height = '8px';
      navMenu.style.width = '8px';
    }

    const EASE = 'cubic-bezier(.4,0,.2,1)';
    const NAV_TRANS = `width .4s ${EASE}, top .4s ${EASE}, border-radius .4s ${EASE}, background .4s ${EASE}, backdrop-filter .4s ${EASE}, -webkit-backdrop-filter .4s ${EASE}`;

    // Track whether scroll has pushed nav into pill mode
    let _inScrollPill = false;

    function clearScrollPill() {
      if (!_inScrollPill) return;
      _inScrollPill = false;
      nav.style.width = ''; nav.style.top = ''; nav.style.borderRadius = '';
      nav.style.background = ''; nav.style.backdropFilter = ''; nav.style.webkitBackdropFilter = '';
      nav.style.setProperty('--pill-w', '');
      navBar.style.paddingLeft = ''; navBar.style.paddingRight = '';
      navBar.style.paddingTop = ''; navBar.style.paddingBottom = '';
      dots.forEach(d => { d.style.opacity=''; d.style.transform=''; d.style.background=''; d.style.width=''; d.style.height=''; });
      navMenu.style.width = '';
    }

    function applyScrollPill() {
      if (_inScrollPill) return;
      _inScrollPill = true;
      setPillState();
    }

    new MutationObserver(() => {
      nav.style.transition = NAV_TRANS;
      void nav.offsetHeight;
      if (nav.classList.contains('is-open')) {
        nav.style.width = ''; nav.style.top = ''; nav.style.borderRadius = '';
        nav.style.background = ''; nav.style.backdropFilter = ''; nav.style.webkitBackdropFilter = '';
        navBar.style.paddingLeft=''; navBar.style.paddingRight='';
        navBar.style.paddingTop=''; navBar.style.paddingBottom='';
        dots.forEach(d => { d.style.opacity=''; d.style.transform=''; d.style.background=''; d.style.width=''; d.style.height=''; });
        navMenu.style.width = '8px';
      } else {
        if (_inScrollPill) setPillState();
        else clearScrollPill();
      }
      setTimeout(() => { nav.style.transition = ''; }, 450);
    }).observe(nav, { attributes:true, attributeFilter:['class'] });

    window.addEventListener('resize', () => { if (_inScrollPill) setPillState(); });
    setPillState();

    // Scroll-driven nav: listens to window scroll (no modal overlay)
    window._initScrollNav = function() {
      const THRESHOLD = 60;
      window.addEventListener('scroll', () => {
        if (window.scrollY > THRESHOLD) applyScrollPill();
        else clearScrollPill();
      }, { passive: true });
    };
  })();

  // === ARTICLE FETCH ===
  const API = 'https://cms.janagramlich.com/wp-json/wp/v2';

  const ANTHROPIC_KEY = ''; // ← paste your Anthropic API key here

  async function generateSummary(title, category, textContent) {
    if (!ANTHROPIC_KEY) return '';
    try {
      const context = [
        `Title: "${title}"`,
        category ? `Category: "${category}"` : '',
        textContent ? `Content: ${textContent.slice(0, 800)}` : '',
      ].filter(Boolean).join('\n');
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'x-api-key': ANTHROPIC_KEY,
          'anthropic-version': '2023-06-01',
          'content-type': 'application/json',
          'anthropic-dangerous-direct-browser-access': 'true',
        },
        body: JSON.stringify({
          model: 'claude-haiku-4-5-20251001',
          max_tokens: 80,
          messages: [{ role: 'user', content: `Write exactly one concise sentence describing what this design article is about. Output only the sentence.\n\n${context}` }],
        }),
      });
      const data = await res.json();
      return data.content?.[0]?.text?.trim() || '';
    } catch { return ''; }
  }

  function stripHtml(html) {
    return new DOMParser().parseFromString(html, 'text/html').body.textContent || '';
  }

  function formatDate(iso) {
    return new Date(iso).toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' });
  }

  function showError(msg) {
    document.getElementById('articleLoading').innerHTML =
      `<div style="max-width:400px;padding:0 16px"><p style="margin-bottom:16px">${msg}</p><a href="articles.html" style="font-size:12px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:#111;border-bottom:1px solid rgba(0,0,0,.25)">← All Articles</a></div>`;
  }

  // Resolve an ACF image field to a URL.
  // acf_format=standard → object with .url; without it → integer attachment ID.
  async function resolveImgUrl(img) {
    if (!img) return '';
    if (typeof img === 'object') return img.url || img.source_url || '';
    // Integer or numeric string → attachment ID, fetch the URL
    const id = parseInt(img, 10);
    if (!id) return typeof img === 'string' ? img : '';
    try {
      const r = await fetch(`${API}/media/${id}?_fields=source_url`, { signal: AbortSignal.timeout(6000) });
      if (r.ok) return (await r.json()).source_url || '';
    } catch(e) {}
    return '';
  }

  // Build project-style blocks from ACF flexible content rows.
  async function renderBlocks(sections, test2) {
    const blocks = [];
    if (test2) {
      blocks.push(`<div class="block block--full block-text"><div class="text-inner"><div class="text-body"><p>${test2}</p></div></div></div>`);
    }
    for (let i = 0; i < sections.length; i++) {
      const s = sections[i];
      console.log(`[article] row[${i}]:`, JSON.stringify(s));
      const layout = (s.acf_fc_layout || '').toLowerCase();
      if (layout === 'image' || layout === 'img' || layout === 'photo') {
        const url = await resolveImgUrl(s.img || s.image || s.photo || s.src || null);
        if (url) {
          blocks.push(`<div class="block block--full block-image"><img src="${url}" alt="${s.caption||''}" loading="lazy"></div>`);
        }
      } else {
        // Text/editor: try known fields, then scan all string fields
        let html = s.wysiwyg || s.text || (typeof s.content === 'string' ? s.content : '') || s.html || s.body || '';
        if (!html) {
          for (const [k, v] of Object.entries(s)) {
            if (k !== 'acf_fc_layout' && typeof v === 'string' && v.trim()) { html = v; break; }
          }
        }
        if (html) blocks.push(`<div class="block block--full block-text"><div class="text-inner"><div class="text-body">${html}</div></div></div>`);
      }
    }
    return { html: blocks.join('') };
  }

  const params = new URLSearchParams(window.location.search);
  const slug   = params.get('slug');
  const postId = params.get('id');

  if (!slug && !postId) {
    showError('No article specified.');
  } else {
    // acf_format=standard removed — wysiwyg always returns HTML regardless,
    // and integer image IDs are resolved via resolveImgUrl() → /media/{id}
    const FIELDS = 'id,title,date,excerpt,slug,content,acf,_links';

    function buildUrl(base) {
      return slug
        ? `${API}/${base}?slug=${encodeURIComponent(slug)}&_fields=${FIELDS}&_embed=true`
        : `${API}/${base}/${postId}?_fields=${FIELDS}&_embed=true`;
    }

    async function fetchArticle() {
      const bases = ['articles', 'article'];
      try {
        const idx = await fetch(API.replace('/wp/v2', ''), { signal: AbortSignal.timeout(5000) }).then(r => r.ok ? r.json() : null);
        if (idx?.routes) {
          const SKIP = new Set([...bases, 'posts','pages','media','types','statuses','taxonomies',
            'tags','categories','users','comments','settings','themes','plugins','blocks',
            'block-renderer','search','batch','sidebars','widgets','widget-types','menus',
            'menu-items','menu-locations','templates','template-parts','global-styles',
            'navigation','font-families','font-collections','pattern-directory',
            'block-types','block-patterns','block-pattern-categories','projects','project']);
          const others = Object.keys(idx.routes)
            .map(p => p.match(/^\/wp\/v2\/([^/?(]+)$/)?.[1])
            .filter(b => b && !SKIP.has(b));
          bases.push(...others);
        }
      } catch(e) {}
      bases.push('posts'); // final fallback

      for (const base of bases) {
        // Try acf_format=standard first (returns full image objects from ACF),
        // then without it as fallback (some WP configs reject the param).
        let post = null;
        for (const acfSuffix of ['&acf_format=standard', '']) {
          const r = await fetch(buildUrl(base) + acfSuffix, { signal: AbortSignal.timeout(10000) }).catch(() => null);
          if (!r) continue;
          if (!r.ok) {
            const body = await r.json().catch(() => ({}));
            if (body.code === 'rest_no_route') { post = null; break; } // skip this base
            console.warn(`[article] /${base}${acfSuffix}: HTTP ${r.status}`, body.code);
            continue; // try next suffix
          }
          const data = await r.json();
          const candidate = Array.isArray(data) ? data[0] : data;
          if (!candidate?.id) continue;
          const hasAcf = candidate.acf && typeof candidate.acf === 'object'
                      && Object.keys(candidate.acf).length > 0;
          console.log(`[article] /${base}${acfSuffix ? ' +std' : ''} → id=${candidate.id} hasAcf=${hasAcf}`);
          if (hasAcf) { post = candidate; break; } // got ACF data — done
          if (!post) post = candidate;              // keep as fallback
        }
        if (post?.id) { console.log('[article] using post', post); return post; }
      }
      throw new Error('Article not found');
    }

    fetchArticle()
      .then(async post => {
        const acf = post.acf || {};
        console.log('[article] ACF keys:', Object.keys(acf));

        const check = v => Array.isArray(v) && v.length > 0
                        && typeof v[0] === 'object' && v[0] !== null && 'acf_fc_layout' in v[0];
        const flexRows = check(acf.content) ? acf.content
                       : (Object.values(acf).find(check) || []);

        const title    = stripHtml(post.title?.rendered || 'Untitled');
        const excerpt  = stripHtml(post.excerpt?.rendered || '').replace(/\[&hellip;\]|\[…\]/g, '').trim();
        const date     = formatDate(post.date);
        const category = post._embedded?.['wp:term']?.[0]?.[0]?.name || '';
        const test2    = acf.test2 || '';

        document.title = title + ' — Jana Gramlich';
        document.getElementById('articleTitle').textContent = title;

        // Subtitle from ACF subtitle field
        const subtitle = acf.subtitle || acf.sub_title || acf.tagline || '';
        if (subtitle) {
          const el = document.getElementById('articleSubtitle');
          el.textContent = subtitle;
          el.style.display = '';
        }

        // AI-generated one-sentence summary
        const textContent = flexRows
          .filter(r => { const l = (r.acf_fc_layout||'').toLowerCase(); return l==='text'||l==='wysiwyg'||l==='paragraph'||l==='copy'; })
          .map(r => stripHtml(r.text||r.wysiwyg||r.content||''))
          .join(' ')
          || stripHtml((post.content?.rendered||'').replace(/<\/p>/gi,' ')).trim();
        const summary = await generateSummary(title, category, textContent);
        if (summary) {
          const el = document.getElementById('articleSummary');
          el.textContent = summary;
          el.style.display = '';
        }

        // Share button (native share API)
        const shareBtn = document.getElementById('shareBtn');
        if (navigator.share) {
          shareBtn.style.display = '';
          shareBtn.addEventListener('click', () => {
            navigator.share({ title, text: summary, url: location.href }).catch(() => {});
          });
        }

        const { html: blocksHtml } = await renderBlocks(flexRows, test2);
        const fallback = (post.content?.rendered || '').trim();
        document.getElementById('blocksGrid').innerHTML = blocksHtml
          || (fallback ? `<div class="block block--full block-text"><div class="text-inner"><div class="text-body">${fallback}</div></div></div>` : '');

        document.getElementById('articleLoading').style.display = 'none';
        document.getElementById('articleModal').classList.add('is-visible');

        // Inject next article section (non-blocking)
        injectNextArticle(post.slug || slug || '');
      })
      .catch(err => {
        console.error('[article] fetch failed:', err);
        const msg = err.name === 'TimeoutError' ? 'Request timed out.' : (err.message || 'network error');
        showError('Could not load article — ' + msg);
      });
  }

  async function injectNextArticle(currentSlug) {
    const FIELDS = 'id,slug,title,acf,_links';
    const bases  = ['articles', 'article', 'posts'];
    let articles = [];
    for (const base of bases) {
      try {
        const r = await fetch(`${API}/${base}?_fields=${FIELDS}&_embed=true&acf_format=standard&per_page=100`, { signal: AbortSignal.timeout(8000) });
        if (!r.ok) continue;
        const data = await r.json();
        if (Array.isArray(data) && data.length > 0) { articles = data; break; }
      } catch(e) {}
    }
    if (articles.length < 2) return;
    const idx = articles.findIndex(a => a.slug === currentSlug);
    if (idx < 0) return;
    const next      = articles[(idx + 1) % articles.length];
    const nextTitle = stripHtml(next.title?.rendered || '');
    const acf       = next.acf || {};
    const imgRow    = (Array.isArray(acf.content) ? acf.content : []).find(s => s.acf_fc_layout === 'image');
    const nextImg   = await resolveImgUrl(imgRow?.img || imgRow?.image)
                   || next._embedded?.['wp:featuredmedia']?.[0]?.source_url
                   || '';
    const nextUrl   = `article.html?slug=${encodeURIComponent(next.slug)}`;
    const ARROW_SVG = `<svg width="8" height="8" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M2.3042 7.69434L7.38914 2.6094" stroke-linecap="square"/><path d="M2.3042 2.14746H7.8514V7.69467" stroke-linecap="square"/></svg>`;

    const pageEnd = document.getElementById('articlePageEnd');
    pageEnd.className = 'article-page-end';
    pageEnd.innerHTML =
      `<div class="page-links">` +
        `<span class="page-links__label">Next Up<span class="page-links__client">${nextTitle}</span></span>` +
        `<a href="articles.html" class="page-links__all">All Articles ${ARROW_SVG}</a>` +
      `</div>` +
      (nextImg
        ? `<div class="article-next-reveal">` +
            `<div class="article-next-reveal__bg"><img src="${nextImg}" alt="" loading="lazy"></div>` +
            `<div class="article-next-reveal__inner"><h2 class="article-next-reveal__title">${nextTitle}</h2></div>` +
          `</div>`
        : '');

    const reveal = pageEnd.querySelector('.article-next-reveal');
    if (reveal) reveal.addEventListener('click', () => { window.location.href = nextUrl; });
  }

  // Always init scroll nav (don't wait for article fetch)
  if (window._initScrollNav) window._initScrollNav();
</script>
</body>
</html>
