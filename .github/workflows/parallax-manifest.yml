name: Update parallax image list

# Whenever images are added to / removed from images/parallax/ on the deployed
# branch, regenerate images/parallax/parallax-images.js so the archive views on
# the home page and the archive page automatically show every image in the folder.
on:
  push:
    branches: [main]
    paths:
      - "images/parallax/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: parallax-manifest
  cancel-in-progress: true

jobs:
  update-list:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate parallax-images.js
        run: |
          dir="images/parallax"
          out="$dir/parallax-images.js"
          files=$(cd "$dir" && ls -1 2>/dev/null | grep -iE '\.(png|jpe?g|webp|gif|avif)$' | LC_ALL=C sort || true)
          {
            echo "// AUTO-GENERATED — do not edit by hand."
            echo "// Regenerated by .github/workflows/parallax-manifest.yml whenever files in"
            echo "// images/parallax/ change, so the archive views pick up new images automatically."
            printf 'window.PARALLAX_IMAGES = ['
            first=1
            while IFS= read -r f; do
              [ -z "$f" ] && continue
              if [ $first -eq 1 ]; then first=0; else printf ','; fi
              printf '\n  "%s"' "$f"
            done <<< "$files"
            printf '\n];\n'
          } > "$out"
          echo "Generated $out:"
          cat "$out"

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add images/parallax/parallax-images.js
          if git diff --staged --quiet; then
            echo "No changes to the parallax image list."
          else
            git commit -m "Auto-update parallax image list"
            git push
          fi
