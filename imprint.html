    .footer-name.jana-in span:not(:nth-child(5)) { opacity:1; transform:translateX(0); }
    .footer-name.jana-in span:nth-child(1) { transition-delay:0ms; }
    .footer-name.jana-in span:nth-child(2) { transition-delay:80ms; }
    .footer-name.jana-in span:nth-child(3) { transition-delay:160ms; }
    .footer-name.jana-in span:nth-child(4) { transition-delay:320ms; }
    .footer-name.jana-animate span {
      animation-timing-function: cubic-bezier(.55,0,1,.45); animation-fill-mode: both;

    .footer-name.jana-animate span:nth-child(1) { animation-name: jana-exit-J;  animation-duration: 1.1s; animation-delay:   0ms; }

    .footer-name.jana-animate span:nth-child(4) { animation-name: jana-exit-A2; animation-duration: 1.1s; animation-delay: 390ms; }
    .footer-name.jana-animate span:nth-child(5) { animation-name: jana-dot; animation-duration: 1.0s; animation-delay: 700ms; animation-fill-mode: both; }
    @keyframes jana-exit-J {
      0%   { transform: translate(0,0) rotate(0deg); opacity:1; }
      30%  { transform: translate(-20vw,-55px) rotate(-18deg); opacity:1; }
      60%  { transform: translate(-90vw, 8px) rotate(-26deg); opacity:0; }
      100% { transform: translate(-130vw, 8px) rotate(-26deg); opacity:0; }
    }
    @keyframes jana-exit-A1 {
      0%   { transform: translate(0,0) rotate(0deg); opacity:1; }
      30%  { transform: translate(-16vw,-44px) rotate(-15deg); opacity:1; }
      60%  { transform: translate(-95vw, 6px) rotate(-23deg); opacity:0; }
      100% { transform: translate(-130vw, 6px) rotate(-23deg); opacity:0; }
    }
    @keyframes jana-exit-N {
      0%   { transform: translate(-34vw, 0) rotate(-4deg); opacity:0; }
      8%   { transform: translate(-37vw,-5px) rotate(-5deg); opacity:1; }
      38%  { transform: translate(-47vw,-34px) rotate(-12deg); opacity:1; }
      68%  { transform: translate(-134vw, 5px) rotate(-20deg); opacity:0; }
      100% { transform: translate(-164vw, 5px) rotate(-20deg); opacity:0; }
    }
    @keyframes jana-exit-A2 {
      0%   { transform: translate(-104vw, 0) rotate(-3deg); opacity:0; }
      8%   { transform: translate(-107vw,-3px) rotate(-4deg); opacity:1; }
      38%  { transform: translate(-114vw,-26px) rotate(-10deg); opacity:1; }
      68%  { transform: translate(-209vw, 4px) rotate(-17deg); opacity:0; }

      55%  { transform: translate(2vw, 6px) rotate(2deg); opacity:1; }

  <!-- LOADING SCREEN -->
  <div id="loadingScreen" class="loading-screen" aria-hidden="true">
    <div class="loading-phrase" id="loadingPhrase"></div>
    <div class="loading-counter" id="loadingCounter"><svg width="10" height="15" viewBox="0 0 10 15" fill="none" aria-hidden="true"><path d="M0 0L0 12L3.5 9L6 14L7.5 13L5 8L9 8Z" fill="#acb0ff" stroke="none"/></svg><span class="loading-cur-tag">Loading <span id="loadingCount">0</span>%</span></div>
  </div>
  <script>
  (function() {
    var phrases=["Turning user needs into business results.","Making complex tasks easy to process.","Striving for consistency to enable scalability.","Reducing noise to what really matters."];
    var overlay=document.getElementById('loadingScreen'),phraseEl=document.getElementById('loadingPhrase'),counterEl=document.getElementById('loadingCounter'),countEl=document.getElementById('loadingCount');
    phraseEl.innerHTML=phrases[Math.floor(Math.random()*phrases.length)].replace(/\n/g,'<br>');
    setTimeout(function(){ phraseEl.classList.add('is-in'); },150);
    var moveTimer=null;
    function moveCursor(){ var rect=phraseEl.getBoundingClientRect(); if(!rect.width){ moveTimer=setTimeout(moveCursor,100); return; } var pad=72,gap=36,side=Math.floor(Math.random()*4),x,y; if(side===0){ x=rect.left+Math.random()*rect.width; y=rect.top-gap-Math.random()*pad; } else if(side===1){ x=rect.right+gap+Math.random()*pad; y=rect.top+Math.random()*rect.height; } else if(side===2){ x=rect.left+Math.random()*rect.width; y=rect.bottom+gap+Math.random()*pad; } else{ x=rect.left-90-Math.random()*pad; y=rect.top+Math.random()*rect.height; } x=Math.max(4,Math.min(window.innerWidth-90,x)); y=Math.max(4,Math.min(window.innerHeight-20,y)); counterEl.style.left=x+'px'; counterEl.style.top=y+'px'; moveTimer=setTimeout(moveCursor,1200+Math.random()*800); }
    requestAnimationFrame(function(){ requestAnimationFrame(function(){ moveCursor(); }); });
    var s=performance.now(),d=1800; function tick(n){ var p=Math.min(100,Math.round((n-s)/d*100)); countEl.textContent=p; if(p<100)requestAnimationFrame(tick); } requestAnimationFrame(tick);
    var minDone=false,apiFetched=false;
    function tryExit(){ if(!minDone||!apiFetched)return; if(moveTimer)clearTimeout(moveTimer); phraseEl.style.transition='opacity 0.4s ease'; phraseEl.style.opacity='0'; counterEl.style.opacity='0'; setTimeout(function(){ overlay.classList.add('is-out'); setTimeout(function(){ if(overlay.parentNode)overlay.parentNode.removeChild(overlay); },800); },450); }
    setTimeout(function(){ minDone=true; tryExit(); },1600);
    window.__loaderDone = function(){ apiFetched=true; tryExit(); };
    document.addEventListener('DOMContentLoaded',function(){ window.__loaderDone(); });
  })();
  </script>

      </div>
    </div>
    <p class="footer-vibe"><span class="nav__cursor" aria-hidden="true"><svg width="10" height="15" viewBox="0 0 10 15" fill="none"><path d="M0 0L0 12L3.5 9L6 14L7.5 13L5 8L9 8Z" fill="#acb0ff" stroke="none"/></svg><span class="nav__cursor-tag"><span>This page is vibe coded</span><span>with Claude Code</span></span></span></p>
    <div class="footer-bottom">
      <img src="images/logo.svg" alt="Logo" class="footer-logo">
      <p class="footer-name"><span>J</span><span>a</span><span>n</span><span>a</span><span>.</span></p>
    </div>
    <div class="footer-legal">
      <a href="imprint.html">Imprint</a>
      <a href="privacy-policy.html">Privacy</a>
    </div>
  </footer>

  <script>
    // === NAV ===
    const nav = document.getElementById('mainNav');
    nav.addEventListener('mouseenter', () => nav.classList.add('is-open'));
    let _mlSuppress = false;
    nav.addEventListener('mouseleave', () => { if (!_mlSuppress) nav.classList.remove('is-open'); });
    nav.addEventListener('touchend', () => { _mlSuppress = true; setTimeout(() => { _mlSuppress = false; }, 600); }, { passive: true });
    nav.querySelector('.nav__logo').addEventListener('touchend', e => {
      if (!nav.classList.contains('is-open')) { e.preventDefault(); nav.classList.add('is-open'); }
    });
    nav.querySelector('.nav__logo').addEventListener('click', e => {
      if (!nav.classList.contains('is-open')) { e.preventDefault(); nav.classList.add('is-open'); }
    });
    nav.querySelector('.nav__menu').addEventListener('click', e => {
      e.stopPropagation();
      nav.classList.toggle('is-open');
    });
    nav.addEventListener('click', e => {
      if (e.pointerType !== 'touch') return;
      const onBar = e.target.closest('.nav__bar');
      const isOpen = nav.classList.contains('is-open');
      if (onBar && !isOpen) { e.preventDefault(); nav.classList.add('is-open'); }
      else if (onBar && !e.target.closest('a')) nav.classList.remove('is-open');
    });
    document.addEventListener('click', e => {
      if (e.pointerType === 'touch' && !e.target.closest('#mainNav')) nav.classList.remove('is-open');
    });

    // === SCROLL-DRIVEN NAV ===
    (function() {
      function lerp(a, b, t) { return a + (b - a) * t; }
      const navBar = nav.querySelector('.nav__bar');
      const navMenu = nav.querySelector('.nav__menu');
      const dots = [...nav.querySelectorAll('.nav__menu span:not(.nav__close-icon)')];
      const logoEl = navBar.querySelector('.nav__logo');

      function updateNavScroll() {
        if (nav.classList.contains('is-open')) return;
        const t = 1;
        const fullW = window.innerWidth;
        const targetW = logoEl.offsetWidth + 48;
        nav.style.width = lerp(fullW, targetW, t) + 'px';
        nav.style.top = window.innerWidth >= 640 ? '8px' : '4px';
        nav.style.borderRadius = lerp(0, 24, t) + 'px';
        nav.style.background = `rgba(255,255,255,${lerp(0, 0.05, t)})`;
        nav.style.setProperty('--nav-bg-opacity', String(lerp(0, 0.65, t)));
        const blur = lerp(0, 20, t);
        const sat = lerp(100, 180, t);
        const filterVal = t > 0.01 ? `blur(${blur}px) saturate(${sat}%)` : 'none';
        nav.style.backdropFilter = filterVal;
        nav.style.webkitBackdropFilter = filterVal;
        nav.style.setProperty('--pill-w', targetW + 'px');
        navBar.style.paddingLeft = '16px';
        navBar.style.paddingRight = '16px';
        navBar.style.paddingBottom = '0';
        dots[0].style.opacity = String(Math.max(0, 1 - t * 1.5));
        dots[2].style.opacity = String(Math.max(0, 1 - t * 1.5));
        dots[0].style.transform = `translateX(${lerp(0, 6, t)}px)`;
        dots[2].style.transform = `translateX(${lerp(0, -6, t)}px)`;
        const r = Math.round(lerp(255, 172, t));
        const g = Math.round(lerp(255, 176, t));
        dots[1].style.background = `rgb(${r},${g},255)`;
        const dotSz = lerp(3, 8, t) + 'px';
        dots[1].style.width = dotSz;
        dots[1].style.height = dotSz;
        navMenu.style.width = lerp(15, 8, t) + 'px';
      }

      const EASE = 'cubic-bezier(.4,0,.2,1)';
      const NAV_TRANS = `width .4s ${EASE}, top .4s ${EASE}, border-radius .4s ${EASE}, background .4s ${EASE}, backdrop-filter .4s ${EASE}, -webkit-backdrop-filter .4s ${EASE}`;

      new MutationObserver(() => {
        nav.style.transition = NAV_TRANS;
        void nav.offsetHeight;
        if (nav.classList.contains('is-open')) {
          nav.style.width = '';
          nav.style.top = '';
          nav.style.borderRadius = '';
          nav.style.background = '';
          nav.style.backdropFilter = '';
          nav.style.webkitBackdropFilter = '';
          navBar.style.paddingLeft = '';
          navBar.style.paddingRight = '';
          navBar.style.paddingTop = '';
          navBar.style.paddingBottom = '';
          dots.forEach(d => { d.style.opacity = ''; d.style.transform = ''; d.style.background = ''; d.style.width = ''; d.style.height = ''; });
          navMenu.style.width = '8px';
        } else {
          updateNavScroll();
        }
        setTimeout(() => { nav.style.transition = ''; }, 450);
      }).observe(nav, { attributes: true, attributeFilter: ['class'] });

      window.addEventListener('scroll', updateNavScroll, { passive: true });
      window.addEventListener('resize', updateNavScroll);
      updateNavScroll();
    })();

    // === FETCH IMPRINT FROM ACF ===
    fetch('https://cms.janagramlich.com/wp-json/wp/v2/pages/85?_fields=acf')
      .then(r => r.json())
      .then(data => {
        const el = document.getElementById('imprint-body');
        if (el && data.acf && data.acf.editor) {
          const doc = new DOMParser().parseFromString(data.acf.editor, 'text/html');
          // Strip wrapper divs — collect all h5 and p elements in order
          const nodes = doc.querySelectorAll('h5, p');
          let html = '';
          nodes.forEach(n => { html += n.outerHTML; });
          el.innerHTML = '<h1>Impressum</h1>' + (html || data.acf.editor);
        }
      })
      .catch(() => {});

    // === JANA FOOTER ANIMATION ===
    (() => {
      const logo = document.querySelector('.footer-logo');
      const jana = document.querySelector('.footer-name');
      if (!logo || !jana) return;
      new IntersectionObserver((entries, obs) => {
        if (entries[0].isIntersecting) { jana.classList.add('jana-in'); obs.disconnect(); }
      }, { threshold: 0.1 }).observe(jana);
      const flyOut = () => {
        if (jana.classList.contains('jana-animate')) return;
        jana.classList.add('jana-animate');
        const lastSpan = jana.querySelector('span:last-child') || jana;
        lastSpan.addEventListener('animationend', () => jana.classList.remove('jana-animate'), { once: true });
      };
      logo.addEventListener('click', flyOut);
      jana.addEventListener('click', flyOut);
    })();
  </script>

</body>
</html>
